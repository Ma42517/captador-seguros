<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PROSPECTA | Interfaz del Asesor</title>
<meta name="description" content="PROSPECTA — Interfaz del Asesor." />
<meta name="theme-color" content="#000000" />

<!-- Tipografías: Montserrat/Inter (marca y UI ejecutiva) + Great Vibes (firma) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@200;300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />

<style>
  /* ============================================================ */
  /* PALETA                                                        */
  /* ============================================================ */
  :root {
    --black:        #000000;
    --white:        #ffffff;
    --steel:        #9aa4af; /* gris acero */
    --steel-deep:   #6c7681; /* gris acero profundo */
    --silver:       #b0bec5; /* plata */
    --steel-cyan:   #74b9cc; /* azul acero / cyan muy sutil (2ª pregunta) */
    --carbon:       #26272b;

    /* Ritmo de la coreografía del intro (JS lee estos tiempos) */
    --absorb-time:  800ms;
    --curtain-time: 1150ms;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ============================================================ */
  /* CAPA DE FONDO — negro absoluto (#000000), revelado al abrir.  */
  /* ============================================================ */
  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: var(--black);
  }

  /* ============================================================ */
  /* PANEL DEL ASESOR · CAPTURA DE DATOS (SPA ultra-lujo)          */
  /* Vive bajo la cortina (z-2) y emerge cuando la cortina abre.   */
  /* ============================================================ */
  .advisor {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1.5rem, 6vw, 4rem);
    opacity: 0;
    pointer-events: none;
    transition: opacity 900ms ease;
  }
  .stage.is-open .advisor {
    opacity: 1;
    pointer-events: auto;
    transition-delay: var(--curtain-time);
  }

  .capture {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: clamp(2rem, 7vh, 3.75rem);
    width: 100%;
    max-width: 46rem;
    transform: translateY(20px);
    transition: transform 1000ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .stage.is-open .capture {
    transform: translateY(0);
    transition-delay: var(--curtain-time);
  }

  /* Pregunta superior: sans-serif limpia y ejecutiva */
  .capture__question {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(1.3rem, 4.4vw, 2.35rem);
    line-height: 1.35;
    letter-spacing: 0.015em;
    color: #eef1f4;
    max-width: 20ch;
    text-wrap: balance;
    transition: opacity 320ms ease, transform 320ms ease;
  }
  .capture__question.is-hiding {
    opacity: 0;
    transform: translateY(-8px);
  }

  /* --- Campo de firma dinámico (línea inferior que crece) --- */
  .capture__field {
    position: relative;
    display: inline-flex;
    justify-content: center;
    align-items: flex-end;
    /* overflow visible: la 'P' y el nombre pueden salir del campo */
  }

  /* Espejo oculto que mide el ancho real del texto en tiempo real */
  .capture__mirror {
    position: absolute;
    visibility: hidden;
    white-space: pre;
    pointer-events: none;
    left: -9999px;
    top: 0;
  }

  /* El input y el espejo comparten EXACTAMENTE la misma tipografía */
  .capture__input,
  .capture__mirror {
    font-family: 'Great Vibes', 'Dancing Script', cursive;
    font-size: clamp(2.4rem, 9vw, 4.25rem);
    line-height: 1.15;
    letter-spacing: 0.01em;
    padding: 0 0.18em 0.12em;
  }

  .capture__input {
    width: var(--min-line, 220px);
    min-width: var(--min-line, 220px);
    max-width: 90vw;
    text-align: center;
    color: var(--white);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--silver);
    caret-color: var(--white);
    /* La línea (borde inferior) crece/contrae de forma fluida; el color transiciona */
    transition: width 260ms cubic-bezier(0.22, 1, 0.36, 1),
                border-color 700ms ease,
                box-shadow 700ms ease;
  }
  .capture__input:focus { outline: none; } /* quita el outline azul del navegador */

  /* Segunda pregunta en adelante: la línea pasa a azul acero / cyan sutil */
  .capture__field[data-line="cyan"] .capture__input {
    border-bottom-color: var(--steel-cyan);
    caret-color: var(--steel-cyan);
    box-shadow: 0 3px 16px -8px rgba(116, 185, 204, 0.65);
  }

  /* Pista discreta (sustituye al botón: se avanza con Enter) */
  .capture__hint {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.62rem, 1.6vw, 0.78rem);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(176, 190, 197, 0.34);
    transition: opacity 320ms ease;
  }
  .capture__hint.is-dim { opacity: 0; }
  .capture__hint kbd {
    font-family: inherit;
    letter-spacing: normal;
    padding: 0 0.25em;
    color: rgba(176, 190, 197, 0.6);
  }

  /* --- Nombre "en vuelo": clon que la 'P' se lleva hacia la izquierda --- */
  .capture__flying {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 2;
    white-space: nowrap;
    pointer-events: none;
    font-family: 'Great Vibes', 'Dancing Script', cursive;
    font-size: clamp(2.4rem, 9vw, 4.25rem);
    line-height: 1.15;
    color: var(--white);
    transform: translate(-50%, -50%);
    transition: transform 470ms cubic-bezier(0.6, 0, 0.35, 1) 320ms,
                opacity 400ms ease 320ms;
  }
  .capture__flying.is-absorbed {
    transform: translate(-50%, -50%) translateX(-46vw) scale(0.16);
    opacity: 0;
  }

  /* --- Logotipo 'P' 3D en gris acero con glow (entra por la derecha) --- */
  .capture-p {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 3;
    pointer-events: none;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 11vw, 5.25rem);
    line-height: 1;
    color: #aeb7c0;
    text-shadow:
      1px 1px 0 #8b939c,
      2px 2px 0 #79818b,
      3px 3px 0 #676f79,
      4px 4px 8px rgba(0, 0, 0, 0.55),
      0 0 22px rgba(174, 183, 192, 0.55); /* glow sutil */
    /* Entra desde la derecha (48vw), cruza el centro y sale por la izquierda */
    transform: translate(-50%, -50%) translateX(48vw);
    transition: transform 780ms cubic-bezier(0.7, 0, 0.25, 1);
  }
  .capture-p.is-flying { transform: translate(-50%, -50%) translateX(-64vw); }

  /* ============================================================ */
  /* CORTINA — dos mitades negras que se abren a los lados.        */
  /* Costura plata sutil en el borde interior (visible sobre negro)*/
  /* ============================================================ */
  .curtain { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
  .curtain__half {
    position: absolute;
    top: 0;
    width: 50.2vw;
    height: 100%;
    background: var(--black);
    will-change: transform;
    transition: transform var(--curtain-time) cubic-bezier(0.76, 0, 0.24, 1);
  }
  .curtain__half--left  { left: 0;  transform: translateX(0); }
  .curtain__half--right { right: 0; transform: translateX(0); }
  .curtain__half--left::after,
  .curtain__half--right::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(176, 190, 197, 0.28), transparent);
  }
  .curtain__half--left::after  { right: 0; }
  .curtain__half--right::before { left: 0; }
  .stage.is-open .curtain__half--left  { transform: translateX(-100%); }
  .stage.is-open .curtain__half--right { transform: translateX(100%); }

  /* ============================================================ */
  /* CAPA DEL LOGO — pantalla de inicio (P + ROSPECTA + firma)     */
  /* ============================================================ */
  .logo-layer {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage.is-open .logo-layer { pointer-events: none; }

  .brand {
    display: flex;
    align-items: center;
    gap: clamp(0.15rem, 1vw, 0.5rem);
    padding: 0;
    background: none;
    border: 0;
    cursor: pointer;
    transition: transform var(--curtain-time) cubic-bezier(0.76, 0, 0.24, 1);
  }
  .brand:focus-visible { outline: 2px solid var(--steel); outline-offset: 14px; border-radius: 8px; }
  .stage.is-open .brand { transform: translateX(-120vw); }

  .brand__box {
    position: relative;
    flex-shrink: 0;
    width: clamp(88px, 15vw, 148px);
    height: clamp(88px, 15vw, 148px);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: clamp(14px, 2.2vw, 22px);
    background: linear-gradient(150deg, #ffffff 0%, #f2f4f7 40%, #d5dae0 100%);
    box-shadow:
      0 0 34px rgba(255, 255, 255, 0.30),
      0 0 78px rgba(255, 255, 255, 0.12),
      18px 22px 45px rgba(0, 0, 0, 0.85),
      inset 3px 3px 7px rgba(255, 255, 255, 0.95),
      inset -6px -6px 14px rgba(108, 118, 129, 0.55);
    transition: transform var(--absorb-time) cubic-bezier(0.34, 1.4, 0.5, 1),
                box-shadow 400ms ease;
  }
  .brand:hover .brand__box {
    box-shadow:
      0 0 44px rgba(255, 255, 255, 0.42),
      0 0 96px rgba(255, 255, 255, 0.18),
      18px 22px 45px rgba(0, 0, 0, 0.85),
      inset 3px 3px 7px rgba(255, 255, 255, 0.95),
      inset -6px -6px 14px rgba(108, 118, 129, 0.55);
  }

  .brand__p {
    font-family: 'Montserrat', 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(58px, 10vw, 100px);
    line-height: 1;
    color: var(--steel-deep);
    text-shadow:
      -1px -1px 1px rgba(0, 0, 0, 0.55),
      1px 1px 1px rgba(255, 255, 255, 0.85),
      0 2px 3px rgba(0, 0, 0, 0.25);
    user-select: none;
  }

  .brand__text { position: relative; display: inline-block; }
  .brand__word {
    display: inline-flex;
    font-family: 'Montserrat', 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(46px, 8vw, 82px);
    line-height: 1;
    letter-spacing: 0.01em;
    color: var(--white);
    white-space: nowrap;
  }
  .brand__signature {
    position: absolute;
    top: calc(100% + clamp(4px, 1.2vh, 12px));
    left: 0;
    display: inline-flex;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.62rem, 1.7vw, 0.95rem);
    letter-spacing: 0.16em;
    text-transform: lowercase;
    color: rgba(176, 190, 197, 0.34);
  }
  .brand__word span,
  .brand__signature span {
    display: inline-block;
    transform-origin: left center;
    transition: transform var(--absorb-time) cubic-bezier(0.6, 0, 0.35, 1),
                opacity calc(var(--absorb-time) * 0.7) ease;
  }
  .stage.is-absorbing .brand__word span,
  .stage.is-absorbing .brand__signature span {
    transform: translateX(var(--pull, -120px)) scaleX(0.05);
    opacity: 0;
  }
  .stage.is-absorbing .brand__box { transform: scale(1.06); }

  /* ============================================================ */
  /* RESPONSIVIDAD                                                 */
  /* ============================================================ */
  @media (max-width: 380px) {
    .brand__word { font-size: 40px; }
    .brand__p    { font-size: 52px; }
    .brand__box  { width: 78px; height: 78px; }
    .brand__signature { font-size: 0.58rem; letter-spacing: 0.12em; }
  }
  @media (orientation: landscape) and (max-height: 500px) {
    .brand__box  { width: clamp(70px, 14vh, 110px); height: clamp(70px, 14vh, 110px); }
    .brand__p    { font-size: clamp(46px, 9vh, 74px); }
    .brand__word { font-size: clamp(40px, 7.5vh, 66px); }
    .capture { gap: clamp(1.25rem, 5vh, 2rem); }
    .capture__question { font-size: clamp(1.15rem, 6vh, 1.9rem); }
    .capture__input, .capture__mirror, .capture__flying { font-size: clamp(2rem, 12vh, 3.2rem); }
  }

  /* ============================================================ */
  /* ACCESIBILIDAD — respeta "reducir movimiento"                  */
  /* ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .brand, .brand__box, .brand__word span, .brand__signature span,
    .curtain__half, .advisor, .capture,
    .capture-p, .capture__flying, .capture__input { transition-duration: 0.001ms !important; }
  }
</style>
</head>

<body>

  <!-- La escena. La clase del contenedor controla las fases del intro:
       (sin clase) → Fase 1 · .is-absorbing → Fase 2 · .is-open → Fase 3 -->
  <div class="stage" id="stage">

    <!-- Fondo negro revelado al abrir la cortina -->
    <div class="backdrop" aria-hidden="true"></div>

    <!-- ===================================================== -->
    <!-- PANEL DEL ASESOR · CAPTURA DE DATOS                    -->
    <!-- ===================================================== -->
    <section class="advisor" id="advisor" aria-label="Captura de datos del diagnóstico">
      <div class="capture" id="capture">
        <h2 class="capture__question" id="captureQuestion">Su nombre, por favor</h2>

        <div class="capture__field" id="captureField" data-line="silver">
          <span class="capture__mirror" id="captureMirror" aria-hidden="true"></span>
          <input
            type="text"
            id="captureInput"
            class="capture__input"
            autocomplete="off"
            autocapitalize="words"
            spellcheck="false"
            enterkeyhint="next"
            maxlength="80"
            aria-label="Escriba su respuesta" />
        </div>

        <p class="capture__hint" id="captureHint">Presione <kbd>Enter</kbd> para continuar</p>
      </div>
    </section>

    <!-- CORTINA -->
    <div class="curtain" aria-hidden="true">
      <div class="curtain__half curtain__half--left"></div>
      <div class="curtain__half curtain__half--right"></div>
    </div>

    <!-- CAPA LOGO: recuadro 3D "P" + "ROSPECTA" + firma -->
    <div class="logo-layer">
      <button type="button" class="brand" id="brand" aria-label="PROSPECTA">
        <span class="brand__box">
          <span class="brand__p" aria-hidden="true">P</span>
        </span>
        <span class="brand__text">
          <span class="brand__word" id="word" aria-hidden="true">
            <span>R</span><span>O</span><span>S</span><span>P</span><span>E</span><span>C</span><span>T</span><span>A</span>
          </span>
          <span class="brand__signature" id="signature" aria-hidden="true" data-text="by m.aceves y consultores"></span>
        </span>
      </button>
    </div>

  </div>

  <script>
  (function () {
    'use strict';

    /* ============================================================ */
    /* ESTADO COMPARTIDO — respuestas del asesor (personalización)   */
    /* ============================================================ */
    var advisorState = { answers: {} };
    window.PROSPECTA = window.PROSPECTA || {};
    window.PROSPECTA.advisorState = advisorState;

    /* Preguntas del flujo (extensible). lineColor define el color de   */
    /* la línea de captura una vez que se muestra esa pregunta.         */
    var QUESTIONS = [
      { key: 'nombre',   label: 'Su nombre, por favor',        lineColor: 'silver' },
      { key: 'negocio',  label: '¿A qué se dedica su negocio?', lineColor: 'cyan'   }
    ];
    var qIndex = 0;

    var stage     = document.getElementById('stage');
    var brand     = document.getElementById('brand');
    var word      = document.getElementById('word');
    var signature = document.getElementById('signature');

    var advisor   = document.getElementById('advisor');
    var question  = document.getElementById('captureQuestion');
    var field     = document.getElementById('captureField');
    var input     = document.getElementById('captureInput');
    var mirror    = document.getElementById('captureMirror');
    var hint      = document.getElementById('captureHint');

    var css = getComputedStyle(document.documentElement);
    var ABSORB  = parseTime(css.getPropertyValue('--absorb-time'), 800);
    var CURTAIN = parseTime(css.getPropertyValue('--curtain-time'), 1150);
    var PAUSE   = 1000;
    var STEP    = 28;

    function parseTime(v, fallback) {
      v = (v || '').trim();
      if (!v) return fallback;
      if (v.indexOf('ms') !== -1) return parseFloat(v);
      if (v.indexOf('s') !== -1) return parseFloat(v) * 1000;
      return fallback;
    }

    /* ============================================================ */
    /* PANTALLA DE INICIO (P + ROSPECTA + firma) → CORTINA           */
    /* ============================================================ */
    (function buildSignature() {
      var text = signature.getAttribute('data-text') || 'by m.aceves y consultores';
      var frag = document.createDocumentFragment();
      Array.prototype.forEach.call(text, function (ch) {
        var span = document.createElement('span');
        span.textContent = (ch === ' ') ? '\u00A0' : ch;
        frag.appendChild(span);
      });
      signature.appendChild(frag);
    })();

    function primeLine(container, startIndex) {
      var containerLeft = container.getBoundingClientRect().left;
      var spans = container.children;
      for (var i = 0; i < spans.length; i++) {
        var el = spans[i];
        var pull = -(el.getBoundingClientRect().left - containerLeft) - el.offsetWidth;
        el.style.setProperty('--pull', pull + 'px');
        el.style.transitionDelay = ((startIndex + i) * STEP) + 'ms';
      }
      return spans.length;
    }

    var introRunning = false;
    function runIntro() {
      if (introRunning) return;
      introRunning = true;
      brand.disabled = true;

      var count = 0;
      count += primeLine(word, count);
      count += primeLine(signature, count);
      stage.classList.add('is-absorbing');

      var absorbTotal = ABSORB + (count * STEP);
      window.setTimeout(function () {
        stage.classList.add('is-open');
        window.setTimeout(startCapture, CURTAIN + 120);
      }, absorbTotal + PAUSE);
    }
    brand.addEventListener('click', runIntro);

    /* ============================================================ */
    /* CAPTURA DE DATOS · firma dinámica + "magia de la P"           */
    /* ============================================================ */

    // Ancho mínimo de la línea (leído del CSS al iniciar).
    var minLine = 220;

    // Ajusta el ancho del input (y por tanto de la línea) al texto real.
    function syncWidth() {
      mirror.textContent = input.value || '';
      var textW = mirror.getBoundingClientRect().width;
      var target = Math.max(minLine, Math.ceil(textW) + 24); // +espacio para el cursor
      // Límite superior responsivo (no exceder el viewport)
      var cap = Math.floor(window.innerWidth * 0.9);
      input.style.width = Math.min(target, cap) + 'px';
    }

    function placeCaret() {
      var len = input.value.length;
      try { input.setSelectionRange(len, len); } catch (e) {}
    }

    function startCapture() {
      // Fija el mínimo real de la línea a partir del layout renderizado.
      var declaredMin = parseFloat(getComputedStyle(input).minWidth);
      if (declaredMin && !isNaN(declaredMin)) minLine = declaredMin;
      syncWidth();
      input.focus();
      placeCaret();
    }

    input.addEventListener('input', function () {
      syncWidth();
      // La pista se atenúa mientras el usuario escribe.
      hint.classList.toggle('is-dim', input.value.trim().length > 0);
    });

    var transitioning = false;
    input.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      if (transitioning) return;
      if (input.value.trim().length === 0) return;
      runPMagic();
    });

    /* La "magia de la P": la P entra desde la derecha, pasa sobre el
       nombre en cursiva y se lo lleva hacia la izquierda (absorción),
       mientras la pregunta cambia (fade) y la línea se reinicia. */
    function runPMagic() {
      transitioning = true;

      var current = QUESTIONS[qIndex];
      var value = input.value.trim();
      advisorState.answers[current.key] = value;
      advisorState[current.key] = value;
      console.info('[PROSPECTA] Capturado:', current.key, '→', value);

      var isLast = (qIndex >= QUESTIONS.length - 1);
      var next = isLast ? null : QUESTIONS[qIndex + 1];

      // Congela el ancho actual de la línea durante la animación.
      var rect = input.getBoundingClientRect();
      input.style.width = rect.width + 'px';

      // Clon "en vuelo" del nombre escrito (misma cursiva).
      var flying = document.createElement('span');
      flying.className = 'capture__flying';
      flying.textContent = value;
      field.appendChild(flying);

      // Oculta el texto real del input (sin borrar aún el valor).
      input.style.color = 'transparent';
      input.setAttribute('readonly', 'readonly');
      hint.classList.add('is-dim');

      // Invoca dinámicamente la 'P' 3D que entra desde la derecha.
      var pLogo = document.createElement('span');
      pLogo.className = 'capture-p';
      pLogo.textContent = 'P';
      field.appendChild(pLogo);

      // Fuerza reflow para que la transición arranque desde el estado inicial.
      void pLogo.offsetWidth;
      pLogo.classList.add('is-flying');          // la P cruza hacia la izquierda
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          flying.classList.add('is-absorbed');   // el nombre es absorbido
        });
      });

      // Cambio de pregunta (SPA) sincronizado con la absorción.
      window.setTimeout(function () {
        if (next) {
          swapQuestion(next.label);
        } else {
          swapQuestion('Gracias, ' + firstName(advisorState.nombre) + '.');
        }
      }, 200);

      // La línea se vacía, se contrae al mínimo y cambia de color.
      window.setTimeout(function () {
        input.value = '';
        input.style.color = '';
        input.removeAttribute('readonly');
        syncWidth(); // contrae la línea al mínimo (transición de width)

        if (next) {
          field.setAttribute('data-line', next.lineColor === 'cyan' ? 'cyan' : 'silver');
        }
      }, 800);

      // Limpieza y reposicionamiento del cursor para la nueva respuesta.
      window.setTimeout(function () {
        if (flying.parentNode) flying.parentNode.removeChild(flying);
        if (pLogo.parentNode) pLogo.parentNode.removeChild(pLogo);

        if (next) {
          qIndex++;
          hint.classList.remove('is-dim');
          transitioning = false;
          input.focus();
          placeCaret();
        } else {
          // Última pregunta respondida: listo para la siguiente sección.
          finishCapture();
        }
      }, 1050);
    }

    function swapQuestion(text) {
      question.classList.add('is-hiding');
      window.setTimeout(function () {
        question.textContent = text;
        question.classList.remove('is-hiding');
      }, 260);
    }

    function firstName(full) {
      if (!full) return '';
      return full.trim().split(/\s+/)[0];
    }

    function finishCapture() {
      // Punto de enganche para la Fase 2 del diagnóstico (aún por construir).
      // Aquí quedan disponibles todas las respuestas en advisorState.answers.
      hint.classList.add('is-dim');
      input.setAttribute('readonly', 'readonly');
      transitioning = false;
      console.info('[PROSPECTA] Captura completa:', advisorState.answers);
    }

    // Recalcula el ancho de la línea si cambia el tamaño de la ventana.
    var resizeTimer;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () { if (!transitioning) syncWidth(); }, 120);
    });
  })();
  </script>

</body>
</html>
