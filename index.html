<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>¡Construye tu Futuro!</title>
<meta name="theme-color" content="#a1c4fd" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:#3a2c72; --ink-soft:#6a5fa0;
    --glass:rgba(255,255,255,.24);
    --bounce:cubic-bezier(0.175,0.885,0.32,1.275);
    --fill:#ffd23f;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Nunito',system-ui,sans-serif;overflow:hidden;color:var(--ink)}

  /* ===== Fondo animado por fase ===== */
  .app{position:fixed;inset:0;overflow:hidden;
    background:linear-gradient(135deg,#6dd5fa,#a1c4fd,#c2a8fd,#e6c3fc);
    background-size:300% 300%;animation:grad 16s ease infinite;transition:filter .4s ease}
  .app[data-goal="auto"]    {background:linear-gradient(135deg,#2b2d68,#4b3f9e,#8a5cff,#c06ad0);background-size:300% 300%}
  .app[data-goal="casa"]    {background:linear-gradient(135deg,#3fb27f,#7bd389,#c8e6a0,#ffdfb0);background-size:300% 300%}
  .app[data-goal="libertad"]{background:linear-gradient(135deg,#43bfe8,#7db9ff,#b6d6ff,#ffe29a);background-size:300% 300%}
  .app[data-goal="auto"]    {--fill:#00e6ff}
  .app[data-goal="casa"]    {--fill:#ffd23f}
  .app[data-goal="libertad"]{--fill:#ffd86b}
  @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .app.shake{animation:grad 16s ease infinite, shake .6s cubic-bezier(.36,.07,.19,.97)}
  @keyframes shake{10%,90%{transform:translate(-3px,1px) rotate(-.4deg)}20%,80%{transform:translate(5px,-2px) rotate(.5deg)}30%,50%,70%{transform:translate(-9px,4px) rotate(-.9deg)}40%,60%{transform:translate(9px,-3px) rotate(.9deg)}}

  /* Nubes / destellos flotantes */
  .deco{position:absolute;pointer-events:none;user-select:none;opacity:.85;filter:drop-shadow(0 6px 12px rgba(0,0,0,.08))}
  .cloud{font-size:clamp(2.6rem,9vw,5rem);animation:drift linear infinite}
  .spark{font-size:clamp(1rem,3vw,1.6rem);animation:twinkle ease-in-out infinite}
  @keyframes drift{from{transform:translateX(-20vw)}to{transform:translateX(120vw)}}
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}

  /* ===== Fases ===== */
  .phase{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:clamp(1.2rem,5vw,3rem);text-align:center;gap:clamp(1.4rem,4vh,2.4rem);
    opacity:0;pointer-events:none;transform:scale(.98);transition:opacity .5s ease,transform .5s ease}
  .phase.is-active{opacity:1;pointer-events:auto;transform:scale(1)}

  /* ---- FASE 1 ---- */
  .title{font-family:'Fredoka',sans-serif;font-weight:700;color:#fff;line-height:1.15;
    font-size:clamp(1.6rem,5.4vw,3rem);max-width:16ch;
    text-shadow:0 3px 0 rgba(120,90,200,.35),0 10px 26px rgba(80,60,160,.35);
    transform:translateY(-140%);opacity:0}
  .phase.is-active .title{animation:dropIn .9s var(--bounce) .1s forwards}
  @keyframes dropIn{to{transform:translateY(0);opacity:1}}

  .cards{display:flex;gap:clamp(.9rem,2.6vw,1.6rem);flex-wrap:wrap;justify-content:center;width:100%;max-width:820px}
  .card{position:relative;flex:1 1 220px;max-width:260px;min-width:150px;cursor:pointer;border:0;
    background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1.5px solid rgba(255,255,255,.55);border-radius:30px;padding:clamp(1.4rem,4vw,2.2rem) 1rem;
    display:flex;flex-direction:column;align-items:center;gap:.7rem;
    box-shadow:0 20px 42px rgba(70,60,150,.28),inset 0 2px 0 rgba(255,255,255,.7);
    transition:transform .3s var(--bounce),box-shadow .3s ease;animation:levitate 3.4s ease-in-out infinite}
  .card:nth-child(2){animation-delay:.5s}
  .card:nth-child(3){animation-delay:1s}
  @keyframes levitate{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .card:hover{box-shadow:0 26px 52px rgba(70,60,150,.34),inset 0 2px 0 rgba(255,255,255,.8)}
  .card:active{transform:scale(.95)}
  .card.fall{animation:fallAway .6s cubic-bezier(.4,0,.9,.5) forwards!important;pointer-events:none}
  @keyframes fallAway{to{transform:translateY(130vh) rotate(28deg);opacity:0}}
  .card__emoji{font-size:clamp(3.4rem,11vw,5.4rem);line-height:1;filter:drop-shadow(0 8px 10px rgba(0,0,0,.15))}
  .card__title{font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(1rem,2.8vw,1.35rem);color:var(--ink)}

  /* ---- FASE 2 · Slider ---- */
  .p2-instr{font-family:'Fredoka',sans-serif;font-weight:600;color:#fff;font-size:clamp(1.15rem,3.6vw,1.7rem);line-height:1.35;text-shadow:0 3px 14px rgba(60,40,120,.35);max-width:20ch}
  .slider-zone{position:relative;width:min(90vw,560px);padding:64px 0 8px;touch-action:none}
  .goal-emoji{position:absolute;right:-10px;top:-14px;font-size:clamp(2.4rem,8vw,3.4rem);animation:pulse 1.3s ease-in-out infinite;filter:drop-shadow(0 0 14px rgba(255,255,255,.9))}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
  .tip{position:absolute;top:6px;left:0;transform:translateX(-50%);
    background:#fff;color:var(--ink);font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.05rem;
    padding:8px 15px;border-radius:16px;box-shadow:0 10px 22px rgba(80,60,160,.3);white-space:nowrap;pointer-events:none;transition:left .05s linear}
  .tip::after{content:"";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:#fff;border-bottom:0}

  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:30px;background:transparent;touch-action:none;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:30px;border-radius:22px;background:var(--track,rgba(255,255,255,.25));box-shadow:inset 0 3px 8px rgba(40,20,90,.25)}
  input[type=range]::-moz-range-track{height:30px;border-radius:22px;background:var(--track,rgba(255,255,255,.25));box-shadow:inset 0 3px 8px rgba(40,20,90,.25)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:54px;height:54px;margin-top:-12px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#fff,#e8ecff);border:4px solid #fff;
    box-shadow:0 7px 0 rgba(90,70,190,.5),0 12px 20px rgba(90,70,190,.45),inset 0 3px 0 #fff}
  input[type=range]::-moz-range-thumb{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#e8ecff);border:4px solid #fff;box-shadow:0 7px 0 rgba(90,70,190,.5),0 12px 20px rgba(90,70,190,.45)}
  input[type=range]:disabled{cursor:default}

  /* ---- FASE 4/5 · Bottom sheet ---- */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:300;
    background:linear-gradient(180deg,#ffffff,#f3f1fb);border-radius:36px 36px 0 0;
    padding:clamp(1.6rem,5vw,2.6rem) clamp(1.4rem,5vw,2.6rem) calc(clamp(1.6rem,5vw,2.6rem) + env(safe-area-inset-bottom,0));
    box-shadow:0 -18px 50px rgba(50,30,110,.3);
    transform:translateY(110%);transition:transform .6s var(--bounce);max-height:94vh;overflow-y:auto;
    display:flex;flex-direction:column;align-items:center;gap:1rem;text-align:center}
  .sheet.is-up{transform:translateY(0)}
  @media(min-width:820px){.sheet{left:20%;right:20%;border-radius:40px 40px 0 0}}
  .sheet__grip{width:52px;height:6px;border-radius:6px;background:rgba(60,40,120,.18);margin-bottom:.4rem}
  .sheet__badge{font-size:2.6rem;line-height:1;animation:pulse 1.4s ease-in-out infinite}
  .sheet__title{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.5rem,5vw,2.1rem);color:var(--ink)}
  .sheet__text{font-weight:600;font-size:clamp(.98rem,3vw,1.12rem);line-height:1.5;color:var(--ink-soft);max-width:42ch}
  .sheet__hook{font-weight:700;font-size:clamp(.98rem,3vw,1.12rem);line-height:1.5;color:var(--ink);max-width:42ch;background:rgba(255,140,26,.1);border:1.5px dashed rgba(255,140,26,.45);border-radius:20px;padding:14px 16px}
  .sheet__hook b{color:#ef7d1a}

  .form{display:flex;flex-direction:column;gap:.8rem;width:100%;max-width:26rem;margin-top:.2rem}
  .inp{width:100%;border:0;border-radius:18px;background:rgba(58,44,114,.06);padding:16px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:1.05rem;color:var(--ink);transition:box-shadow .2s ease,background .2s ease}
  .inp::placeholder{color:#a49dc2;font-weight:600}
  .inp:focus{outline:none;background:#fff;box-shadow:0 0 0 4px rgba(255,140,26,.4)}
  .inp.bad{box-shadow:0 0 0 4px rgba(240,80,80,.45)}

  .cta{width:100%;max-width:26rem;border:0;border-radius:24px;cursor:pointer;
    font-family:'Fredoka',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.02em;
    font-size:clamp(1.05rem,3.6vw,1.35rem);color:#fff;padding:20px 18px;margin-top:.4rem;
    background:linear-gradient(180deg,#2fd170,#12a94f);
    box-shadow:0 11px 0 #0c7a39,0 18px 28px rgba(18,169,79,.45),inset 0 3px 0 rgba(255,255,255,.5);
    animation:pulse 1.7s ease-in-out infinite;transition:transform .2s var(--bounce),box-shadow .15s ease}
  .cta:active{animation:none;transform:translateY(8px) scale(.97);box-shadow:0 3px 0 #0c7a39,0 8px 14px rgba(18,169,79,.4),inset 0 3px 0 rgba(255,255,255,.4)}

  /* ===== Pantalla final "Licencia Activada" ===== */
  .done{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
    text-align:center;padding:2rem;background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff;
    opacity:0;pointer-events:none;transition:opacity .5s ease}
  .done.is-on{opacity:1;pointer-events:auto}
  .done .ring{width:76px;height:76px;border-radius:50%;border:7px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .done h2{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.5rem,5vw,2.2rem);max-width:20ch}
  .done p{font-weight:700;font-size:clamp(1rem,3vw,1.2rem);opacity:.92;max-width:26ch}

  /* Partículas */
  .particle{position:fixed;z-index:400;pointer-events:none;will-change:transform,opacity}
  .confetti{width:13px;height:13px;border-radius:4px;animation:pfly .95s ease-out forwards}
  @keyframes pfly{to{transform:translate(var(--tx),var(--ty)) rotate(var(--rot));opacity:0}}
  .debris{width:12px;height:12px;border-radius:3px;animation:pfall 1.15s ease-in forwards}
  @keyframes pfall{to{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}}
  .star{position:absolute;z-index:6;pointer-events:none;font-size:1.1rem;animation:starUp 1s ease-out forwards}
  @keyframes starUp{0%{transform:translateY(0) scale(.6);opacity:1}100%{transform:translateY(-70px) scale(1.1);opacity:0}}

  @media(prefers-reduced-motion:reduce){
    .app,.card,.goal-emoji,.cta,.sheet__badge,.spark,.cloud{animation:none!important}
    .title{transform:none;opacity:1;animation:none}
  }
</style>
</head>

<body>
<div class="app" id="app">

  <!-- Decoración de fondo -->
  <div class="deco cloud" style="top:12%;animation-duration:34s">☁️</div>
  <div class="deco cloud" style="top:26%;animation-duration:48s;animation-delay:-12s;font-size:3.2rem">☁️</div>
  <div class="deco cloud" style="top:70%;animation-duration:40s;animation-delay:-24s">☁️</div>
  <div class="deco spark" style="top:20%;left:14%;animation-duration:2.6s">✨</div>
  <div class="deco spark" style="top:64%;left:82%;animation-duration:3.1s;animation-delay:.6s">✨</div>
  <div class="deco spark" style="top:40%;left:70%;animation-duration:2.2s;animation-delay:1s">⭐</div>
  <div class="deco spark" style="top:78%;left:24%;animation-duration:2.8s;animation-delay:.3s">✨</div>

  <!-- FASE 1 · Tablero de los Sueños -->
  <section class="phase is-active" id="p1">
    <h1 class="title">¡Construye tu Futuro!<br>¿Cuál es tu próxima gran meta?</h1>
    <div class="cards">
      <button class="card" data-goal="auto">
        <span class="card__emoji">🚘</span>
        <span class="card__title">Mi Auto Ideal</span>
      </button>
      <button class="card" data-goal="casa">
        <span class="card__emoji">🏡</span>
        <span class="card__title">Casa Propia</span>
      </button>
      <button class="card" data-goal="libertad">
        <span class="card__emoji">✈️</span>
        <span class="card__title">Libertad Financiera</span>
      </button>
    </div>
  </section>

  <!-- FASE 2 · El Camino del Héroe -->
  <section class="phase" id="p2">
    <p class="p2-instr">¿Qué tan cerca estás de lograrlo?<br>Desliza para indicarlo.</p>
    <div class="slider-zone">
      <span class="goal-emoji" id="goalEmoji">🚘</span>
      <div class="tip" id="tip">0%</div>
      <input type="range" id="slider" min="0" max="100" value="0" step="1" aria-label="Progreso hacia tu meta" />
    </div>
  </section>

  <!-- FASE 4/5 · Panel diagnóstico + captura -->
  <div class="sheet" id="sheet" role="dialog" aria-modal="true">
    <div class="sheet__grip"></div>
    <div class="sheet__badge" id="sheetBadge">🚘</div>
    <h2 class="sheet__title" id="sheetTitle"></h2>
    <p class="sheet__text" id="sheetText"></p>
    <p class="sheet__hook" id="sheetHook"></p>
    <form class="form" id="form" novalidate>
      <input class="inp" id="fPhone" type="tel" inputmode="tel" placeholder="Tu número celular" maxlength="20" />
      <input class="inp" id="fEmail" type="email" inputmode="email" placeholder="Tu correo principal" maxlength="120" />
      <button class="cta" type="submit">🛡️ BLINDAR MI META AHORA</button>
    </form>
  </div>

  <!-- Pantalla final -->
  <div class="done" id="done">
    <div class="ring"></div>
    <h2>Licencia Activada ✅</h2>
    <p>El mapa de ruta ha sido generado. Agendando entrega de 20 mins…</p>
  </div>

</div>

<script>
(function(){
  'use strict';

  /* ============ gameData: textos por ruta ============ */
  var gameData = {
    auto: {
      emoji:'🚘',
      title: function(x){ return '¡Aceleración al '+x+'%!'; },
      text:'Tienes un excelente motor, pero conducir a esta velocidad sin amortiguadores es ir sin frenos. Un bache de salud o un imprevisto fuerte puede destrozar tu motor financiero y regresarte a la línea de salida.'
    },
    casa: {
      emoji:'🏡',
      title: function(x){ return '¡Cimientos al '+x+'%!'; },
      text:'Has construido una gran base, pero levantar paredes sin blindaje patrimonial es dejar el techo abierto. Una tormenta médica inesperada puede inundar tus ahorros y derrumbar el esfuerzo de años.'
    },
    libertad: {
      emoji:'✈️',
      title: function(x){ return '¡Despegue al '+x+'%!'; },
      text:'Gran altitud, pero viajar sin un paracaídas de protección es un riesgo crítico. Una turbulencia financiera o de salud inesperada puede cancelar tu libertad y derribar tus planes.'
    }
  };

  var state = { goal:'', value:0, phone:'', email:'' };
  window.GAME = state;

  var app     = document.getElementById('app');
  var p1      = document.getElementById('p1');
  var p2      = document.getElementById('p2');
  var slider  = document.getElementById('slider');
  var tip     = document.getElementById('tip');
  var goalEmoji = document.getElementById('goalEmoji');
  var sheet   = document.getElementById('sheet');
  var done    = document.getElementById('done');
  var CONFETTI = ['#ff5ecb','#ffd23f','#4bc0e8','#7bd389','#b06ab3','#ff8c1a','#ffffff'];

  /* ============ Sistema de partículas ============ */
  function spawn(cls, x, y, css){
    var d = document.createElement('div');
    d.className = 'particle ' + cls;
    d.style.left = x + 'px'; d.style.top = y + 'px';
    for(var k in css){ d.style.setProperty(k, css[k]); }
    document.body.appendChild(d);
    setTimeout(function(){ d.remove(); }, 1300);
    return d;
  }
  function burst(x, y){
    for(var i=0;i<34;i++){
      var ang = Math.random()*Math.PI*2, dist = 90+Math.random()*170;
      var d = spawn('confetti', x, y, {});
      d.style.background = CONFETTI[i % CONFETTI.length];
      d.style.setProperty('--tx', Math.cos(ang)*dist + 'px');
      d.style.setProperty('--ty', Math.sin(ang)*dist - 40 + 'px');
      d.style.setProperty('--rot', (Math.random()*720-360) + 'deg');
    }
  }
  function rain(x0, x1, y){
    var grays = ['#c94f4f','#e07b3a','#8f9199','#6b6e77','#d6a15e'];
    for(var i=0;i<30;i++){
      var d = spawn('debris', x0 + Math.random()*(x1-x0), y, {});
      d.style.background = grays[i % grays.length];
      d.style.setProperty('--dx', (Math.random()*60-30) + 'px');
      d.style.setProperty('--dy', 220 + Math.random()*220 + 'px');
      d.style.setProperty('--rot', (Math.random()*540-270) + 'deg');
      d.style.animationDelay = (Math.random()*0.25) + 's';
    }
  }
  function starPop(){
    var zone = slider.parentNode, r = slider.getBoundingClientRect(), zr = zone.getBoundingClientRect();
    var s = document.createElement('span'); s.className='star'; s.textContent = Math.random()<.5?'✨':'⭐';
    s.style.left = (thumbX() ) + 'px'; s.style.top = (r.top - zr.top) + 'px';
    zone.appendChild(s); setTimeout(function(){ s.remove(); }, 1000);
  }

  /* ============ FASE 1 → 2 ============ */
  Array.prototype.forEach.call(document.querySelectorAll('.card'), function(card){
    card.addEventListener('click', function(){
      if(state.goal) return;
      state.goal = card.getAttribute('data-goal');
      var r = card.getBoundingClientRect();
      burst(r.left + r.width/2, r.top + r.height/2);
      Array.prototype.forEach.call(document.querySelectorAll('.card'), function(c){ if(c!==card) c.classList.add('fall'); });
      card.style.transition='transform .4s var(--bounce),opacity .4s ease';
      card.style.transform='scale(1.1)';
      setTimeout(function(){ card.style.opacity='0'; }, 260);
      setTimeout(goToPath, 620);
    });
  });

  function goToPath(){
    app.setAttribute('data-goal', state.goal);
    goalEmoji.textContent = gameData[state.goal].emoji;
    p1.classList.remove('is-active');
    p2.classList.add('is-active');
    updateSlider();
  }

  /* ============ FASE 2 · Slider ============ */
  function thumbX(){
    var w = slider.clientWidth, tw = 54;
    return (state.value/100)*(w - tw) + tw/2;
  }
  function updateSlider(){
    var v = +slider.value; state.value = v;
    slider.style.setProperty('--track',
      'linear-gradient(to right, var(--fill) 0 '+v+'%, rgba(255,255,255,.25) '+v+'% 100%)');
    tip.textContent = v + '%';
    tip.style.left = thumbX() + 'px';
  }

  var dragging=false, lastStar=0, broke=false;
  slider.addEventListener('input', function(){
    updateSlider();
    var now = Date.now();
    if(now - lastStar > 90 && state.value>0){ lastStar = now; starPop(); }
  });
  slider.addEventListener('pointerdown', function(){ dragging=true; });
  window.addEventListener('pointerup', function(){ if(dragging){ dragging=false; triggerBreak(); } });
  window.addEventListener('touchend', function(){ if(dragging){ dragging=false; triggerBreak(); } });
  slider.addEventListener('change', triggerBreak); // respaldo

  /* ============ FASE 3 · El Quiebre ============ */
  function triggerBreak(){
    if(broke || !p2.classList.contains('is-active')) return;
    broke = true;
    var v = state.value;
    slider.disabled = true;
    // El tramo restante se rompe (rojo peligro)
    slider.style.setProperty('--track',
      'linear-gradient(to right, var(--fill) 0 '+v+'%, #ff5a5a '+v+'% 100%)');
    // Temblor
    app.classList.add('shake');
    setTimeout(function(){ app.classList.remove('shake'); }, 640);
    // Escombros cayendo del tramo roto
    var r = slider.getBoundingClientRect();
    var startX = r.left + (v/100)*r.width;
    rain(startX, r.right, r.top + 15);
    // Abre el panel
    setTimeout(openSheet, 720);
  }

  /* ============ FASE 4/5 · Panel ============ */
  function openSheet(){
    var g = gameData[state.goal], x = state.value, y = 100 - x;
    document.getElementById('sheetBadge').textContent = g.emoji;
    document.getElementById('sheetTitle').textContent = g.title(x);
    document.getElementById('sheetText').textContent  = g.text;
    document.getElementById('sheetHook').innerHTML =
      'El sistema inteligente ya calculó las piezas exactas para completar tu puente y blindar el <b>'+y+'%</b> restante. Activa tu licencia de diagnóstico ingresando tus datos:';
    sheet.classList.add('is-up');
  }

  var form = document.getElementById('form');
  var fPhone = document.getElementById('fPhone');
  var fEmail = document.getElementById('fEmail');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    var okP = fPhone.value.replace(/\D/g,'').length >= 8;
    var okE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(fEmail.value.trim());
    fPhone.classList.toggle('bad', !okP);
    fEmail.classList.toggle('bad', !okE);
    if(!okP || !okE){ (!okP?fPhone:fEmail).focus(); return; }
    state.phone = fPhone.value.trim(); state.email = fEmail.value.trim();
    console.info('[GAME] Perfil:', state);
    done.classList.add('is-on');
  });

  window.addEventListener('resize', function(){ if(p2.classList.contains('is-active')) updateSlider(); });
})();
</script>
</body>
</html>
