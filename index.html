<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PROSPECTA | Interfaz del Asesor</title>
<meta name="description" content="PROSPECTA — Interfaz del Asesor." />
<meta name="theme-color" content="#000000" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Montserrat:wght@300;400;700;800;900&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet" />

<style>
  /* ============================================================ */
  /* PALETA + VARIABLES                                            */
  /* ============================================================ */
  :root {
    --black:      #000000;
    --white:      #ffffff;
    --silver:     #b0bec5;
    --steel-cyan: #74b9cc;
    --carbon:     #0f1115;

    --big:        clamp(2.6rem, 8vw, 7rem);        /* letras gigantes */
    --sweep-size: clamp(2.1rem, 6vw, 3.8rem);      /* [ P ] barredor */
    --min-line:   clamp(180px, 45vw, 300px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden;                               /* sin scroll durante la caída */
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .stage { position: fixed; inset: 0; }

  /* ============================================================ */
  /* CAPA INFERIOR (CONTENIDO) — Gris Carbón + captura            */
  /* ============================================================ */
  .content {
    position: absolute; inset: 0; z-index: 1;
    background: var(--carbon);
    display: flex; align-items: center; justify-content: center;
    padding: clamp(1.5rem, 6vw, 4rem);
  }
  .capture {
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    gap: clamp(2rem, 7vh, 3.75rem);
    width: 100%; max-width: 46rem; margin: 0 auto;
  }
  .capture__question {
    font-family: 'Inter', sans-serif; font-weight: 300;
    font-size: clamp(1.3rem, 4.4vw, 2.35rem);
    line-height: 1.35; letter-spacing: 0.015em;
    color: #eef1f4; max-width: 20ch; text-wrap: balance;
    transition: opacity 320ms ease, transform 320ms ease;
  }
  .capture__question.is-hiding { opacity: 0; transform: translateY(-8px); }

  .capture__field { position: relative; display: flex; justify-content: center; align-items: flex-end; width: 100%; }
  .capture__mirror { position: absolute; visibility: hidden; white-space: pre; pointer-events: none; left: -9999px; top: 0; }

  .capture__input, .capture__mirror, .capture__flying {
    font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 500;
    font-size: clamp(2rem, 7.2vw, 3.7rem);
    line-height: 1.2; letter-spacing: 0.005em;
    padding: 0 0.2em 0.1em;
  }
  .capture__input {
    width: var(--min-line); min-width: var(--min-line); max-width: 90vw;
    text-align: center; color: var(--white);
    background: transparent; border: none;
    border-bottom: 2px solid var(--silver);
    caret-color: var(--white);
    transition: width 300ms cubic-bezier(0.22, 1, 0.36, 1), border-color 700ms ease, box-shadow 700ms ease;
  }
  .capture__input:focus { outline: none; }
  .capture__field[data-line="cyan"] .capture__input {
    border-bottom-color: var(--steel-cyan);
    caret-color: var(--steel-cyan);
    box-shadow: 0 3px 16px -8px rgba(116, 185, 204, 0.65);
  }

  .capture__hint {
    font-family: 'Inter', sans-serif; font-weight: 300;
    font-size: clamp(0.62rem, 1.6vw, 0.78rem);
    letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(176, 190, 197, 0.34);
    transition: opacity 320ms ease;
  }
  .capture__hint.is-dim { opacity: 0; }
  .capture__hint kbd { font-family: inherit; letter-spacing: normal; padding: 0 0.25em; color: rgba(176, 190, 197, 0.6); }

  .capture__flying {
    position: absolute; left: 50%; top: 50%; z-index: 2;
    white-space: nowrap; pointer-events: none; color: var(--white);
    transform: translate(-50%, -50%);
    transition: transform 500ms cubic-bezier(0.6, 0, 0.35, 1) 300ms, opacity 420ms ease 300ms;
  }
  .capture__flying.is-absorbed { transform: translate(-50%, -50%) translateX(-46vw) scale(0.14); opacity: 0; }

  /* BARREDOR: el mismo logo [ P ] cruzando con estela */
  .sweeper {
    position: absolute; left: 50%; top: 50%; z-index: 5; pointer-events: none;
    display: inline-flex; align-items: baseline;
    transform: translate(-50%, -50%) translateX(54vw);
    transition: transform 850ms ease-in-out;
    will-change: transform, box-shadow;
  }
  .sweeper .s-br { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: var(--sweep-size); color: var(--white); line-height: 1; }
  .sweeper .s-p  { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: var(--sweep-size); color: var(--white); line-height: 1; margin: 0 0.16em; }
  .sweeper.is-sweeping {
    transform: translate(-50%, -50%) translateX(-70vw);
    animation: sweepTrail 850ms ease-in-out forwards;
  }
  @keyframes sweepTrail {
    0%   { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
    18%  { box-shadow: 85px 0 60px 5px rgba(255, 255, 255, 0.30), 175px 0 115px 2px rgba(184, 192, 200, 0.18); }
    60%  { box-shadow: 72px 0 55px 5px rgba(255, 255, 255, 0.24), 145px 0 100px 2px rgba(184, 192, 200, 0.14); }
    100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
  }

  /* ============================================================ */
  /* CAPA SUPERIOR (TELÓN) — negro absoluto, sube al final         */
  /* ============================================================ */
  .curtain {
    position: absolute; inset: 0; z-index: 10;
    background: var(--black);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    transition: transform 0.68s cubic-bezier(0.5, 0, 0.35, 1);
  }
  .curtain.is-lifting { transform: translateY(-100vh); pointer-events: none; }

  .logo-block {
    display: flex; flex-direction: column; align-items: stretch;
    cursor: pointer; background: none; border: 0; padding: 0;
  }
  .logo-block:focus-visible .logo-row { outline: 2px solid var(--steel-cyan); outline-offset: 10px; }

  /* [ PROSPECTA ] — letras gigantes */
  .logo-row {
    display: flex; align-items: baseline; justify-content: center;
    white-space: nowrap;
    color: var(--white);
    line-height: 1;
  }
  .logo-row .bracket {
    font-family: 'Montserrat', sans-serif; font-weight: 300;
    font-size: var(--big); line-height: 1;
  }
  .logo-row .text {
    display: inline-block; overflow: hidden; white-space: nowrap;
    max-width: 6ch;
    font-family: 'Montserrat', sans-serif; font-weight: 800;
    font-size: var(--big); line-height: 1; letter-spacing: 0.005em;
    transition: max-width 0.55s cubic-bezier(0.6, 0, 0.2, 1), opacity 0.35s ease;
  }
  .logo-row .center-p {
    font-family: 'Montserrat', sans-serif; font-weight: 800;
    font-size: var(--big); line-height: 1;
    margin: 0 0.18em;                 /* espacio elegante: [ P ] no se cierra del todo */
  }

  /* Firma: debajo de la sección ROSPECTA, alineada a la derecha */
  .signature {
    align-self: flex-end;
    margin-top: clamp(6px, 1.4vh, 14px);
    padding-right: 0.2em;
    font-family: 'Inter', sans-serif; font-weight: 300;
    font-size: clamp(0.62rem, 1.6vw, 0.9rem);
    letter-spacing: 0.16em; text-transform: lowercase;
    color: rgba(176, 190, 197, 0.42);
    transition: opacity 0.3s ease;
  }

  /* Fase 1 · Contracción: colapsan 'PROS' y 'ECTA'; firma desaparece */
  .stage.is-contracting .signature { opacity: 0; }
  .stage.is-contracting .logo-row .text { max-width: 0; opacity: 0; }

  /* Fase 2 · Caída y rebote (--fall lo calcula el JS para tocar el fondo) */
  .logo-row.is-dropping { animation: fallBounce 860ms forwards; }
  @keyframes fallBounce {
    0%   { transform: translateY(0);            animation-timing-function: cubic-bezier(0.55, 0.05, 0.95, 0.4); } /* gravedad: acelera */
    45%  { transform: translateY(var(--fall));  animation-timing-function: cubic-bezier(0.16, 0.75, 0.3, 1); }    /* toca fondo → tirón */
    100% { transform: translateY(-150vh); }                                                                       /* sale disparado */
  }

  /* ============================================================ */
  /* RESPONSIVIDAD                                                */
  /* ============================================================ */
  @media (max-width: 560px) { :root { --big: clamp(2.1rem, 12vw, 3.6rem); } }
  @media (orientation: landscape) and (max-height: 500px) {
    :root { --big: clamp(2rem, 11vh, 4rem); --sweep-size: clamp(1.8rem, 8vh, 3rem); }
    .capture { gap: clamp(1.25rem, 5vh, 2rem); }
    .capture__question { font-size: clamp(1.15rem, 6vh, 1.9rem); }
    .capture__input, .capture__mirror, .capture__flying { font-size: clamp(1.9rem, 11vh, 3rem); }
  }

  /* ============================================================ */
  /* ACCESIBILIDAD                                                */
  /* ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .logo-row .text, .curtain, .signature, .sweeper, .capture__flying, .capture__input, .capture__question { transition-duration: 0.001ms !important; }
    .logo-row.is-dropping { animation-duration: 0.001ms; }
    .sweeper.is-sweeping { animation: none; }
  }
</style>
</head>

<body>

  <!-- (sin clase) → Fase 1 · .is-contracting → caída/rebote → telón sube → Fase 3 -->
  <div class="stage" id="stage">

    <!-- ===== CAPA INFERIOR (contenido revelado) ===== -->
    <div class="content">
      <div class="capture" id="capture">
        <h2 class="capture__question" id="captureQuestion">Su nombre, por favor</h2>
        <div class="capture__field" id="captureField" data-line="silver">
          <span class="capture__mirror" id="captureMirror" aria-hidden="true"></span>
          <input type="text" id="captureInput" class="capture__input"
            autocomplete="off" autocapitalize="words" spellcheck="false"
            enterkeyhint="next" maxlength="80" aria-label="Escriba su respuesta" />
        </div>
        <p class="capture__hint" id="captureHint">Presione <kbd>Enter</kbd> para continuar</p>
      </div>
    </div>

    <!-- ===== CAPA SUPERIOR (telón negro) ===== -->
    <div class="curtain" id="curtain">
      <button type="button" class="logo-block" id="logoBlock" aria-label="PROSPECTA — iniciar">
        <span class="logo-row" id="logoRow">
          <span class="bracket">[</span><span class="text">PROS</span><span class="center-p">P</span><span class="text">ECTA</span><span class="bracket">]</span>
        </span>
        <span class="signature">by M.aceves y consultores</span>
      </button>
    </div>

  </div>

  <script>
  (function () {
    'use strict';

    var advisorState = { answers: {} };
    window.PROSPECTA = window.PROSPECTA || {};
    window.PROSPECTA.advisorState = advisorState;

    var QUESTIONS = [
      { key: 'nombre',   label: 'Su nombre, por favor',        lineColor: 'silver' },
      { key: 'negocio',  label: '¿A qué se dedica su negocio?', lineColor: 'cyan'   }
    ];
    var qIndex = 0;

    var stage     = document.getElementById('stage');
    var curtain   = document.getElementById('curtain');
    var logoBlock = document.getElementById('logoBlock');
    var logoRow   = document.getElementById('logoRow');

    var question = document.getElementById('captureQuestion');
    var field    = document.getElementById('captureField');
    var input    = document.getElementById('captureInput');
    var mirror   = document.getElementById('captureMirror');
    var hint     = document.getElementById('captureHint');

    var CONTRACT  = 560;   // [ PROSPECTA ] → [ P ]
    var LAUNCH_AT = 390;   // instante del "tirón" (≈45% de 860ms)
    var LIFT      = 680;   // telón sube

    /* ============================================================ */
    /* FASE 1-2 · Contracción → caída/rebote → telón sube           */
    /* ============================================================ */
    var introRunning = false;
    function runIntro() {
      if (introRunning) return;
      introRunning = true;
      logoBlock.disabled = true;

      // Fase 1: colapsan PROS/ECTA y los corchetes se cierran a [ P ].
      stage.classList.add('is-contracting');

      window.setTimeout(function () {
        // Fase 2: calcula la caída EXACTA para tocar el fondo (sin scroll).
        var rect = logoRow.getBoundingClientRect();
        var fall = Math.round(window.innerHeight - rect.bottom - 2);
        logoRow.style.setProperty('--fall', fall + 'px');
        logoRow.classList.add('is-dropping');

        // En el instante del tirón, el telón entero sube con el [ P ].
        window.setTimeout(function () {
          curtain.classList.add('is-lifting');
          window.setTimeout(startCapture, LIFT + 40);
        }, LAUNCH_AT);
      }, CONTRACT);
    }
    logoBlock.addEventListener('click', runIntro);

    /* ============================================================ */
    /* FASE 3 · Captura: firma dinámica + barredor [ P ]            */
    /* ============================================================ */
    var minLine = 220;

    function syncWidth() {
      mirror.textContent = input.value || '';
      var textW = mirror.getBoundingClientRect().width;
      var target = Math.max(minLine, Math.ceil(textW) + 26);
      var cap = Math.floor(window.innerWidth * 0.9);
      input.style.width = Math.min(target, cap) + 'px';
    }
    function placeCaret() { var len = input.value.length; try { input.setSelectionRange(len, len); } catch (e) {} }
    function startCapture() {
      var declaredMin = parseFloat(getComputedStyle(input).minWidth);
      if (declaredMin && !isNaN(declaredMin)) minLine = declaredMin;
      syncWidth(); input.focus(); placeCaret();
    }

    input.addEventListener('input', function () {
      syncWidth();
      hint.classList.toggle('is-dim', input.value.trim().length > 0);
    });

    var transitioning = false;
    input.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      if (transitioning || input.value.trim().length === 0) return;
      runSweeper();
    });

    function makeBracketP() {
      var s = document.createElement('span');
      s.className = 'sweeper';
      var l = document.createElement('span'); l.className = 's-br'; l.textContent = '[';
      var p = document.createElement('span'); p.className = 's-p';  p.textContent = 'P';
      var r = document.createElement('span'); r.className = 's-br'; r.textContent = ']';
      s.appendChild(l); s.appendChild(p); s.appendChild(r);
      return s;
    }

    function runSweeper() {
      transitioning = true;

      var current = QUESTIONS[qIndex];
      var value = input.value.trim();
      advisorState.answers[current.key] = value;
      advisorState[current.key] = value;
      console.info('[PROSPECTA] Capturado:', current.key, '→', value);

      var isLast = (qIndex >= QUESTIONS.length - 1);
      var next = isLast ? null : QUESTIONS[qIndex + 1];

      var rect = input.getBoundingClientRect();
      input.style.width = rect.width + 'px';

      var flying = document.createElement('span');
      flying.className = 'capture__flying';
      flying.textContent = value;
      field.appendChild(flying);

      input.style.color = 'transparent';
      input.setAttribute('readonly', 'readonly');
      hint.classList.add('is-dim');

      var sweeper = makeBracketP();
      field.appendChild(sweeper);
      void sweeper.offsetWidth;
      sweeper.classList.add('is-sweeping');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { flying.classList.add('is-absorbed'); });
      });

      window.setTimeout(function () {
        if (next) swapQuestion(next.label);
        else swapQuestion('Gracias, ' + firstName(advisorState.nombre) + '.');
      }, 220);

      window.setTimeout(function () {
        input.value = '';
        input.style.color = '';
        input.removeAttribute('readonly');
        syncWidth(); // la línea plateada vuelve al centro (mínimo)
        if (next) field.setAttribute('data-line', next.lineColor === 'cyan' ? 'cyan' : 'silver');
      }, 820);

      window.setTimeout(function () {
        if (flying.parentNode) flying.parentNode.removeChild(flying);
        if (sweeper.parentNode) sweeper.parentNode.removeChild(sweeper);
        if (next) {
          qIndex++;
          hint.classList.remove('is-dim');
          transitioning = false;
          input.focus(); placeCaret();
        } else { finishCapture(); }
      }, 1000);
    }

    function swapQuestion(text) {
      question.classList.add('is-hiding');
      window.setTimeout(function () {
        question.textContent = text;
        question.classList.remove('is-hiding');
      }, 240);
    }
    function firstName(full) { return full ? full.trim().split(/\s+/)[0] : ''; }
    function finishCapture() {
      hint.classList.add('is-dim');
      input.setAttribute('readonly', 'readonly');
      transitioning = false;
      console.info('[PROSPECTA] Captura completa:', advisorState.answers);
    }

    var resizeTimer;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () { if (!transitioning) syncWidth(); }, 120);
    });
  })();
  </script>

</body>
</html>
