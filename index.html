<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PROSPECTA | Interfaz del Asesor</title>
<meta name="description" content="PROSPECTA — Interfaz del Asesor." />
<meta name="theme-color" content="#000000" />

<!-- Tipografías: Montserrat/Inter (marca y UI) + Playfair Display (preguntas) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

<style>
  /* ============================================================ */
  /* PALETA (solo negro, blanco, gris acero/plata y gris carbón)   */
  /* Prohibido el dorado.                                          */
  /* ============================================================ */
  :root {
    --black:        #000000;
    --white:        #ffffff;
    --steel:        #9aa4af; /* gris acero */
    --steel-deep:   #6c7681; /* gris acero profundo */
    --silver:       #b0bec5; /* plata */
    --carbon:       #26272b; /* gris carbón */
    --carbon-deep:  #0f1115; /* gris carbón extremadamente oscuro (Fase 1 asesor) */

    /* Ritmo de la coreografía (JS lee estos tiempos vía CSS variables) */
    --absorb-time:  800ms;
    --curtain-time: 1150ms;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ============================================================ */
  /* CAPA DE FONDO — se revela al abrir la cortina.                */
  /* Gris carbón extremadamente oscuro y elegante (#0f1115).       */
  /* ============================================================ */
  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(130% 100% at 50% 28%, #191c22 0%, var(--carbon-deep) 52%, #0a0b0e 100%);
  }

  /* ============================================================ */
  /* PANEL DEL ASESOR — FASE 1: CAPTURA DE NOMBRE                  */
  /* Vive bajo la cortina (z-2) y emerge cuando la cortina abre.   */
  /* ============================================================ */
  .advisor {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1.5rem, 6vw, 4rem);
    opacity: 0;
    pointer-events: none;
    transition: opacity 900ms ease;
  }
  /* Emerge suavemente DESPUÉS de que la cortina termina de abrirse */
  .stage.is-open .advisor {
    opacity: 1;
    pointer-events: auto;
    transition-delay: var(--curtain-time);
  }
  /* Fade-out al pulsar "Continuar": deja la pantalla lista para lo siguiente */
  .stage.is-open .advisor.is-leaving {
    opacity: 0;
    pointer-events: none;
    transition: opacity 700ms ease;
    transition-delay: 0s;
  }

  .advisor__inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: clamp(1.75rem, 5vh, 3rem);
    width: 100%;
    max-width: 42rem;
    transform: translateY(20px);
    transition: transform 1000ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .stage.is-open .advisor__inner {
    transform: translateY(0);
    transition-delay: var(--curtain-time);
  }

  /* Pregunta (H2): serif elegante en blanco / plata mate */
  .advisor__question {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 500;
    font-size: clamp(1.35rem, 4.4vw, 2.6rem);
    line-height: 1.38;
    letter-spacing: 0.005em;
    color: #eef1f4;
    max-width: 20ch;
    text-wrap: balance;
  }

  /* Campo de entrada minimalista: sin bordes, solo línea inferior plata */
  .advisor__field { width: min(92%, 28rem); }
  .advisor__input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(176, 190, 197, 0.45);
    padding: 0.55em 0.4em 0.45em;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: clamp(1.35rem, 4.6vw, 2.1rem);
    color: #ffffff;
    letter-spacing: 0.02em;
    transition: border-color 350ms ease, box-shadow 350ms ease;
  }
  .advisor__input::placeholder {
    color: rgba(176, 190, 197, 0.32);
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  /* Quita el outline azul por defecto del navegador */
  .advisor__input:focus {
    outline: none;
    border-bottom-color: var(--silver);
    box-shadow: 0 3px 14px -8px rgba(176, 190, 197, 0.6);
  }

  /* Botón "Continuar": apagado y deshabilitado al inicio */
  .advisor__continue {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.9rem, 2.4vw, 1.05rem);
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #eef1f4;
    background: transparent;
    border: 1px solid rgba(176, 190, 197, 0.35);
    border-radius: 999px;
    padding: 0.85em 2.8em;
    opacity: 0.3;
    cursor: not-allowed;
    transition: opacity 450ms ease, box-shadow 450ms ease,
                border-color 450ms ease, background 450ms ease, transform 300ms ease;
  }
  /* Encendido: se ilumina con brillo plata sutil al activarse (JS quita [disabled]) */
  .advisor__continue:not([disabled]) {
    opacity: 1;
    cursor: pointer;
    border-color: rgba(176, 190, 197, 0.85);
    box-shadow: 0 0 18px rgba(176, 190, 197, 0.32),
                inset 0 0 14px rgba(176, 190, 197, 0.07);
  }
  .advisor__continue:not([disabled]):hover {
    transform: translateY(-2px);
    background: rgba(176, 190, 197, 0.08);
    box-shadow: 0 0 30px rgba(176, 190, 197, 0.55),
                inset 0 0 16px rgba(176, 190, 197, 0.10);
  }
  .advisor__continue:not([disabled]):active { transform: translateY(0); }
  .advisor__continue:focus-visible { outline: 2px solid var(--silver); outline-offset: 4px; }

  /* ============================================================ */
  /* CORTINA — dos mitades negras que cubren el fondo.             */
  /* Al abrir, se separan hacia izquierda y derecha.               */
  /* ============================================================ */
  .curtain { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

  .curtain__half {
    position: absolute;
    top: 0;
    width: 50.2vw; /* leve solape para evitar línea central */
    height: 100%;
    background: var(--black);
    will-change: transform;
    transition: transform var(--curtain-time) cubic-bezier(0.76, 0, 0.24, 1);
  }
  .curtain__half--left  { left: 0;  transform: translateX(0); }
  .curtain__half--right { right: 0; transform: translateX(0); }

  .stage.is-open .curtain__half--left  { transform: translateX(-100%); }
  .stage.is-open .curtain__half--right { transform: translateX(100%); }

  /* ============================================================ */
  /* CAPA DEL LOGO — sobre la cortina (centrada en pantalla)        */
  /* ============================================================ */
  .logo-layer {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage.is-open .logo-layer { pointer-events: none; }

  /* Bloque de marca: recuadro + palabra/firma, alineados en fila */
  .brand {
    display: flex;
    align-items: center;
    gap: clamp(0.15rem, 1vw, 0.5rem);
    padding: 0;
    background: none;
    border: 0;
    cursor: pointer;
    /* La "P" viaja hacia la izquierda JUNTO CON la cortina */
    transition: transform var(--curtain-time) cubic-bezier(0.76, 0, 0.24, 1);
  }
  .brand:focus-visible { outline: 2px solid var(--steel); outline-offset: 14px; border-radius: 8px; }

  /* Al abrir: el recuadro de la P se desliza fuera con la cortina */
  .stage.is-open .brand { transform: translateX(-120vw); }

  /* --- Recuadro blanco con volumen 3D + brillo exterior --- */
  .brand__box {
    position: relative;
    flex-shrink: 0;
    width: clamp(88px, 15vw, 148px);
    height: clamp(88px, 15vw, 148px);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: clamp(14px, 2.2vw, 22px);
    background: linear-gradient(150deg, #ffffff 0%, #f2f4f7 40%, #d5dae0 100%);
    box-shadow:
      /* Brillo (glow) exterior elegante */
      0 0 34px rgba(255, 255, 255, 0.30),
      0 0 78px rgba(255, 255, 255, 0.12),
      /* Sombra volumétrica de caída */
      18px 22px 45px rgba(0, 0, 0, 0.85),
      /* Luz interior superior-izquierda */
      inset 3px 3px 7px rgba(255, 255, 255, 0.95),
      /* Sombra interior inferior-derecha (volumen) */
      inset -6px -6px 14px rgba(108, 118, 129, 0.55);
    transition: transform var(--absorb-time) cubic-bezier(0.34, 1.4, 0.5, 1),
                box-shadow 400ms ease;
  }
  .brand:hover .brand__box {
    box-shadow:
      0 0 44px rgba(255, 255, 255, 0.42),
      0 0 96px rgba(255, 255, 255, 0.18),
      18px 22px 45px rgba(0, 0, 0, 0.85),
      inset 3px 3px 7px rgba(255, 255, 255, 0.95),
      inset -6px -6px 14px rgba(108, 118, 129, 0.55);
  }

  /* Letra P: gris acero/carbón intenso, con biselado (sombra interior) */
  .brand__p {
    font-family: 'Montserrat', 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(58px, 10vw, 100px);
    line-height: 1;
    color: var(--steel-deep);
    text-shadow:
      -1px -1px 1px rgba(0, 0, 0, 0.55),
      1px 1px 1px rgba(255, 255, 255, 0.85),
      0 2px 3px rgba(0, 0, 0, 0.25);
    user-select: none;
  }

  /* --- Columna de texto: "ROSPECTA" + firma pegada debajo --- */
  .brand__text {
    position: relative;
    display: inline-block;
  }

  /* "ROSPECTA" en blanco, moderna, alineada con la P */
  .brand__word {
    display: inline-flex;
    font-family: 'Montserrat', 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(46px, 8vw, 82px);
    line-height: 1;
    letter-spacing: 0.01em;
    color: var(--white);
    white-space: nowrap;
  }

  /* Firma pegada debajo de ROSPECTA: minúsculas, grisácea y transparente */
  .brand__signature {
    position: absolute;
    top: calc(100% + clamp(4px, 1.2vh, 12px));
    left: 0;
    display: inline-flex;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.62rem, 1.7vw, 0.95rem);
    letter-spacing: 0.16em;
    text-transform: lowercase;
    color: rgba(176, 190, 197, 0.34); /* tono plata muy transparente */
  }

  /* Cada letra (de ROSPECTA y de la firma) se anima por separado */
  .brand__word span,
  .brand__signature span {
    display: inline-block;
    transform-origin: left center;
    transition: transform var(--absorb-time) cubic-bezier(0.6, 0, 0.35, 1),
                opacity calc(var(--absorb-time) * 0.7) ease;
  }

  /* ============================================================ */
  /* ESTADO "ABSORBIENDO" — ROSPECTA y la firma son tragadas por P  */
  /* ============================================================ */
  .stage.is-absorbing .brand__word span,
  .stage.is-absorbing .brand__signature span {
    transform: translateX(var(--pull, -120px)) scaleX(0.05);
    opacity: 0;
  }
  .stage.is-absorbing .brand__box { transform: scale(1.06); }

  /* ============================================================ */
  /* RESPONSIVIDAD — orientación y tamaños                          */
  /* ============================================================ */
  @media (max-width: 380px) {
    .brand__word { font-size: 40px; }
    .brand__p    { font-size: 52px; }
    .brand__box  { width: 78px; height: 78px; }
    .brand__signature { font-size: 0.58rem; letter-spacing: 0.12em; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .brand__box  { width: clamp(70px, 14vh, 110px); height: clamp(70px, 14vh, 110px); }
    .brand__p    { font-size: clamp(46px, 9vh, 74px); }
    .brand__word { font-size: clamp(40px, 7.5vh, 66px); }
    .advisor__inner { gap: clamp(1rem, 4vh, 1.75rem); }
    .advisor__question { font-size: clamp(1.2rem, 5.5vh, 2rem); }
  }

  /* ============================================================ */
  /* ACCESIBILIDAD — respeta "reducir movimiento"                   */
  /* ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .brand,
    .brand__box,
    .brand__word span,
    .brand__signature span,
    .curtain__half,
    .advisor,
    .advisor__inner { transition-duration: 0.001ms !important; }
  }
</style>
</head>

<body>

  <!-- La escena completa. La clase del contenedor controla las fases:
       (sin clase) → Fase 1 · .is-absorbing → Fase 2 · .is-open → Fase 3 -->
  <div class="stage" id="stage">

    <!-- Fondo elegante revelado al abrir la cortina -->
    <div class="backdrop" aria-hidden="true"></div>

    <!-- ===================================================== -->
    <!-- PANEL DEL ASESOR · FASE 1 — CAPTURA DE NOMBRE          -->
    <!-- ===================================================== -->
    <section class="advisor" id="advisor" aria-label="Inicio del diagnóstico">
      <div class="advisor__inner">
        <h2 class="advisor__question">
          Para iniciar su diagnóstico personalizado, ¿con quién tenemos el honor de hablar?
        </h2>

        <div class="advisor__field">
          <input
            type="text"
            id="advisorName"
            class="advisor__input"
            placeholder="Escriba su nombre"
            autocomplete="name"
            enterkeyhint="go"
            maxlength="60"
            aria-label="Su nombre" />
        </div>

        <button type="button" id="advisorContinue" class="advisor__continue" disabled>
          Continuar
        </button>
      </div>
    </section>

    <!-- CORTINA: dos mitades negras que se abren a los lados -->
    <div class="curtain" aria-hidden="true">
      <div class="curtain__half curtain__half--left"></div>
      <div class="curtain__half curtain__half--right"></div>
    </div>

    <!-- CAPA LOGO: recuadro 3D "P" + palabra "ROSPECTA" + firma -->
    <div class="logo-layer">
      <button type="button" class="brand" id="brand" aria-label="PROSPECTA">
        <span class="brand__box">
          <span class="brand__p" aria-hidden="true">P</span>
        </span>
        <span class="brand__text">
          <span class="brand__word" id="word" aria-hidden="true">
            <span>R</span><span>O</span><span>S</span><span>P</span><span>E</span><span>C</span><span>T</span><span>A</span>
          </span>
          <span class="brand__signature" id="signature" aria-hidden="true" data-text="by m.aceves y consultores"></span>
        </span>
      </button>
    </div>

  </div>

  <script>
  (function () {
    'use strict';

    /* ------------------------------------------------------------ */
    /* Estado compartido del asesor (persiste el nombre capturado    */
    /* para personalizar las siguientes pantallas del diagnóstico).  */
    /* ------------------------------------------------------------ */
    var advisorState = { name: '' };

    var stage     = document.getElementById('stage');
    var brand     = document.getElementById('brand');
    var word      = document.getElementById('word');
    var signature = document.getElementById('signature');

    var advisor      = document.getElementById('advisor');
    var nameInput    = document.getElementById('advisorName');
    var continueBtn  = document.getElementById('advisorContinue');

    // Lee los tiempos definidos en CSS para mantener JS y CSS sincronizados.
    var css = getComputedStyle(document.documentElement);
    var ABSORB  = parseTime(css.getPropertyValue('--absorb-time'), 800);
    var CURTAIN = parseTime(css.getPropertyValue('--curtain-time'), 1150);
    var PAUSE   = 1000; // "un segundo después de la absorción"
    var STEP    = 28;   // retardo escalonado entre letras (ms)

    function parseTime(v, fallback) {
      v = (v || '').trim();
      if (!v) return fallback;
      if (v.indexOf('ms') !== -1) return parseFloat(v);
      if (v.indexOf('s') !== -1) return parseFloat(v) * 1000;
      return fallback;
    }

    /* ============================================================ */
    /* PANTALLA DE INICIO NEGRA (P + ROSPECTA + firma) → CORTINA     */
    /* ============================================================ */

    // Construye la firma "by m.aceves y consultores" letra por letra.
    (function buildSignature() {
      var text = signature.getAttribute('data-text') || 'by m.aceves y consultores';
      var frag = document.createDocumentFragment();
      Array.prototype.forEach.call(text, function (ch) {
        var span = document.createElement('span');
        span.textContent = (ch === ' ') ? '\u00A0' : ch;
        frag.appendChild(span);
      });
      signature.appendChild(frag);
    })();

    // Prepara el desplazamiento de cada letra hacia su borde izquierdo
    // (el punto por donde entra al recuadro de la P).
    function primeLine(container, startIndex) {
      var containerLeft = container.getBoundingClientRect().left;
      var spans = container.children;
      for (var i = 0; i < spans.length; i++) {
        var el = spans[i];
        var pull = -(el.getBoundingClientRect().left - containerLeft) - el.offsetWidth;
        el.style.setProperty('--pull', pull + 'px');
        el.style.transitionDelay = ((startIndex + i) * STEP) + 'ms';
      }
      return spans.length;
    }

    var running = false;
    function runSequence() {
      if (running) return;
      running = true;
      brand.disabled = true;

      // FASE 2: ROSPECTA y la firma son absorbidas por el recuadro.
      var count = 0;
      count += primeLine(word, count);
      count += primeLine(signature, count);
      stage.classList.add('is-absorbing');

      var absorbTotal = ABSORB + (count * STEP);

      // FASE 3: un segundo después, se abre la cortina y la P se va con ella;
      // al terminar, emerge el Panel del Asesor y enfocamos el campo de nombre.
      window.setTimeout(function () {
        stage.classList.add('is-open');
        window.setTimeout(function () {
          if (nameInput) {
            try { nameInput.focus({ preventScroll: true }); } catch (e) { nameInput.focus(); }
          }
        }, CURTAIN + 120);
      }, absorbTotal + PAUSE);
    }

    brand.addEventListener('click', runSequence);

    /* ============================================================ */
    /* PANEL DEL ASESOR · FASE 1 — CAPTURA DE NOMBRE                */
    /* ============================================================ */

    // El botón se enciende en cuanto hay un nombre escrito.
    function refreshContinueState() {
      var hasName = nameInput.value.trim().length > 0;
      continueBtn.disabled = !hasName;
    }
    nameInput.addEventListener('input', refreshContinueState);

    // Enter en el campo equivale a pulsar "Continuar" (si está activo).
    nameInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !continueBtn.disabled) {
        e.preventDefault();
        commitName();
      }
    });

    continueBtn.addEventListener('click', commitName);

    function commitName() {
      var name = nameInput.value.trim();
      if (!name) return;

      // 1) Guarda el nombre para personalizar las siguientes pantallas.
      advisorState.name = name;
      // Expuesto globalmente para que las próximas secciones lo lean.
      window.PROSPECTA = window.PROSPECTA || {};
      window.PROSPECTA.advisorState = advisorState;
      console.info('[PROSPECTA] Nombre capturado:', advisorState.name);

      // 2) Fade-out de esta sección; queda lista para la siguiente.
      advisor.classList.add('is-leaving');
      // Punto de enganche para la Fase 2 del diagnóstico (aún por construir):
      // advisor.addEventListener('transitionend', mostrarSiguienteSeccion, { once: true });
    }
  })();
  </script>

</body>
</html>
