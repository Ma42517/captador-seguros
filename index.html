<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PROSPECTA | Interfaz del Asesor</title>
<meta name="description" content="PROSPECTA — Interfaz del Asesor." />
<meta name="theme-color" content="#000000" />

<!-- Tipografías: Montserrat/Inter (marca y UI ejecutiva) + Playfair Display italic (entrada elegante y legible) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Montserrat:wght@500;600;700;800;900&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet" />

<style>
  /* ============================================================ */
  /* PALETA                                                        */
  /* ============================================================ */
  :root {
    --black:        #000000;
    --white:        #ffffff;
    --silver-mat:   #e6e9ed; /* plata mate (logo) */
    --steel:        #9aa4af;
    --silver:       #b0bec5;
    --steel-cyan:   #74b9cc; /* azul acero / cyan sutil (2ª pregunta) */
    --carbon:       #0f1115; /* gris carbón ultra oscuro (Fase 3) */

    --logo-size:    clamp(92px, 13.5vw, 146px);
    --rospecta-gap: clamp(4px, 1vw, 12px);
    --min-line:     clamp(180px, 45vw, 300px);

    --curtain-time: 1150ms;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ============================================================ */
  /* FASE 3 · FONDO — Gris Carbón ultra oscuro (#0f1115).          */
  /* Revelado al abrir la cortina.                                 */
  /* ============================================================ */
  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: var(--carbon);
  }

  /* ============================================================ */
  /* FASE 3 · CAPTURA DE DATOS (SPA)                               */
  /* ============================================================ */
  .advisor {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1.5rem, 6vw, 4rem);
    opacity: 0;
    pointer-events: none;
    transition: opacity 900ms ease;
  }
  .stage.is-open .advisor {
    opacity: 1;
    pointer-events: auto;
    transition-delay: var(--curtain-time);
  }

  .capture {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: clamp(2rem, 7vh, 3.75rem);
    width: 100%;
    max-width: 46rem;
    margin: 0 auto;
    transform: translateY(20px);
    transition: transform 1000ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .stage.is-open .capture {
    transform: translateY(0);
    transition-delay: var(--curtain-time);
  }

  /* Pregunta: sans-serif elegante y blanca */
  .capture__question {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(1.3rem, 4.4vw, 2.35rem);
    line-height: 1.35;
    letter-spacing: 0.015em;
    color: #eef1f4;
    max-width: 20ch;
    text-wrap: balance;
    transition: opacity 320ms ease, transform 320ms ease;
  }
  .capture__question.is-hiding { opacity: 0; transform: translateY(-8px); }

  /* Campo dinámico: ocupa ancho completo y centra (crece desde el centro) */
  .capture__field {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    width: 100%;
  }

  .capture__mirror {
    position: absolute;
    visibility: hidden;
    white-space: pre;
    pointer-events: none;
    left: -9999px;
    top: 0;
  }

  /* Input, espejo y clon comparten la itálica Playfair (legible y sofisticada) */
  .capture__input,
  .capture__mirror,
  .capture__flying {
    font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(2rem, 7.2vw, 3.7rem);
    line-height: 1.2;
    letter-spacing: 0.005em;
    padding: 0 0.2em 0.1em;
  }

  .capture__input {
    width: var(--min-line);
    min-width: var(--min-line);
    max-width: 90vw;
    text-align: center;
    color: var(--white);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--silver); /* solo línea inferior plateada */
    caret-color: var(--white);
    transition: width 300ms cubic-bezier(0.22, 1, 0.36, 1),
                border-color 700ms ease, box-shadow 700ms ease;
  }
  .capture__input:focus { outline: none; } /* quita el outline azul del navegador */

  .capture__field[data-line="cyan"] .capture__input {
    border-bottom-color: var(--steel-cyan);
    caret-color: var(--steel-cyan);
    box-shadow: 0 3px 16px -8px rgba(116, 185, 204, 0.65);
  }

  .capture__hint {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.62rem, 1.6vw, 0.78rem);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(176, 190, 197, 0.34);
    transition: opacity 320ms ease;
  }
  .capture__hint.is-dim { opacity: 0; }
  .capture__hint kbd { font-family: inherit; letter-spacing: normal; padding: 0 0.25em; color: rgba(176, 190, 197, 0.6); }

  /* Clon "en vuelo" + 'P' con estela de cometa (transición entre preguntas) */
  .capture__flying {
    position: absolute;
    left: 50%; top: 50%;
    z-index: 2;
    white-space: nowrap;
    pointer-events: none;
    color: var(--white);
    transform: translate(-50%, -50%);
    transition: transform 520ms cubic-bezier(0.6, 0, 0.35, 1) 350ms,
                opacity 440ms ease 350ms;
  }
  .capture__flying.is-absorbed { transform: translate(-50%, -50%) translateX(-46vw) scale(0.16); opacity: 0; }

  .capture-p {
    position: absolute;
    left: 50%; top: 50%;
    z-index: 3;
    pointer-events: none;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 11vw, 5.25rem);
    line-height: 1;
    color: #aeb7c0;
    text-shadow:
      1px 1px 0 #8b939c, 2px 2px 0 #79818b, 3px 3px 0 #676f79,
      4px 4px 8px rgba(0, 0, 0, 0.55), 0 0 22px rgba(174, 183, 192, 0.55);
    will-change: transform, box-shadow;
    transform: translate(-50%, -50%) translateX(48vw);
    transition: transform 1000ms ease-in-out;
  }
  .capture-p.is-flying {
    transform: translate(-50%, -50%) translateX(-64vw);
    animation: cometTrail 1000ms ease-in-out forwards;
  }
  @keyframes cometTrail {
    0%   { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
    16%  { box-shadow: 70px 0 55px 6px rgba(255, 255, 255, 0.38), 150px 0 95px 2px rgba(176, 190, 197, 0.24); }
    62%  { box-shadow: 60px 0 50px 6px rgba(255, 255, 255, 0.30), 125px 0 85px 2px rgba(176, 190, 197, 0.18); }
    100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
  }

  /* ============================================================ */
  /* CORTINA — dos mitades negras que se abren a los lados.        */
  /* Sin línea central (solape amplio, sin bordes/seudo-elementos) */
  /* ============================================================ */
  .curtain { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
  .curtain__half {
    position: absolute;
    top: 0;
    width: 50.5vw;
    height: 100%;
    background: var(--black);
    border: 0;
    will-change: transform;
    transition: transform var(--curtain-time) cubic-bezier(0.76, 0, 0.24, 1);
  }
  .curtain__half--left  { left: 0;  transform: translateX(0); }
  .curtain__half--right { right: 0; transform: translateX(0); }
  .stage.is-open .curtain__half--left  { transform: translateX(-100%); }
  .stage.is-open .curtain__half--right { transform: translateX(100%); }

  /* ============================================================ */
  /* FASE 1 · CAPA DEL LOGO — logo geométrico + ROSPECTA + firma   */
  /* ============================================================ */
  .logo-layer {
    position: fixed;
    inset: 0;
    z-index: 20;
    transition: opacity 600ms ease;
  }
  /* Al abrir la cortina, el logo NO se mueve: solo se desvanece */
  .stage.is-open .logo-layer { opacity: 0; pointer-events: none; }

  .brand {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: none;
    border: 0;
    padding: 0;
    color: var(--silver-mat);
  }
  .brand:focus-visible { outline: none; }
  .brand:focus-visible .logo-svg { filter: drop-shadow(0 0 0 transparent); outline: 2px solid var(--steel); outline-offset: 12px; }

  /* ROSPECTA: a la derecha EXACTA del logo · z-index BAJO (queda detrás) */
  .rospecta {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(calc(var(--logo-size) / 2 + var(--rospecta-gap)), -50%);
    z-index: 1;
    display: flex;
    white-space: nowrap;
    font-family: 'Montserrat', 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(38px, 6.6vw, 64px);
    line-height: 1;
    letter-spacing: 0.01em;
    color: var(--white);
    user-select: none;
  }
  .rospecta span {
    display: inline-block;
    transition: transform 760ms cubic-bezier(0.7, 0, 0.2, 1);
  }
  .stage.is-absorbing .rospecta span { transform: translateX(var(--pull, -320px)); }

  /* Máscara negra: oculta la palabra al deslizarse (mitad izquierda + logo).
     Invisible sobre el fondo negro; sirve solo de oclusor por z-index. */
  .logo-backing {
    position: absolute;
    top: 0; bottom: 0;
    left: 0;
    width: calc(50% + var(--logo-size) / 2);
    background: var(--black);
    z-index: 2;
  }

  /* Logo geométrico plano · centro absoluto · z-index ALTO (encima) */
  .logo-mark {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: var(--logo-size);
    height: var(--logo-size);
    z-index: 3;
  }
  .logo-svg { display: block; width: 100%; height: 100%; color: var(--silver-mat); }

  /* Firma al pie · discreta, minúsculas, plata muy transparente */
  .signature {
    position: fixed;
    left: 0; right: 0;
    bottom: max(1.5rem, env(safe-area-inset-bottom, 0));
    z-index: 21;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.64rem, 1.7vw, 0.85rem);
    letter-spacing: 0.2em;
    text-transform: lowercase;
    color: rgba(176, 190, 197, 0.32);
    transition: opacity 500ms ease;
  }
  .stage.is-open .signature { opacity: 0; }

  /* ============================================================ */
  /* RESPONSIVIDAD                                                 */
  /* ============================================================ */
  @media (max-width: 380px) {
    .rospecta { font-size: 34px; }
  }
  @media (orientation: landscape) and (max-height: 500px) {
    :root { --logo-size: clamp(74px, 15vh, 120px); }
    .rospecta { font-size: clamp(32px, 7vh, 56px); }
    .capture { gap: clamp(1.25rem, 5vh, 2rem); }
    .capture__question { font-size: clamp(1.15rem, 6vh, 1.9rem); }
    .capture__input, .capture__mirror, .capture__flying { font-size: clamp(1.9rem, 11vh, 3rem); }
  }

  /* ============================================================ */
  /* ACCESIBILIDAD — respeta "reducir movimiento"                  */
  /* ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .rospecta span, .curtain__half, .advisor, .capture, .logo-layer,
    .capture-p, .capture__flying, .capture__input, .signature { transition-duration: 0.001ms !important; }
    .capture-p.is-flying { animation: none; }
  }
</style>
</head>

<body>

  <!-- (sin clase) → Fase 1 · .is-absorbing → Fase 2 · .is-open → Fase 3 -->
  <div class="stage" id="stage">

    <!-- FASE 3 · Fondo carbón revelado al abrir la cortina -->
    <div class="backdrop" aria-hidden="true"></div>

    <!-- FASE 3 · Captura de datos -->
    <section class="advisor" id="advisor" aria-label="Captura de datos del diagnóstico">
      <div class="capture" id="capture">
        <h2 class="capture__question" id="captureQuestion">Su nombre, por favor</h2>
        <div class="capture__field" id="captureField" data-line="silver">
          <span class="capture__mirror" id="captureMirror" aria-hidden="true"></span>
          <input type="text" id="captureInput" class="capture__input"
            autocomplete="off" autocapitalize="words" spellcheck="false"
            enterkeyhint="next" maxlength="80" aria-label="Escriba su respuesta" />
        </div>
        <p class="capture__hint" id="captureHint">Presione <kbd>Enter</kbd> para continuar</p>
      </div>
    </section>

    <!-- FASE 2 · Cortina (sin línea central) -->
    <div class="curtain" aria-hidden="true">
      <div class="curtain__half curtain__half--left"></div>
      <div class="curtain__half curtain__half--right"></div>
    </div>

    <!-- FASE 1 · Capa del logo -->
    <div class="logo-layer" id="logoLayer">
      <button type="button" class="brand" id="brand" aria-label="PROSPECTA — iniciar">

        <!-- ROSPECTA (z bajo: se esconde detrás del logo) -->
        <span class="rospecta" id="rospecta" aria-hidden="true">
          <span>R</span><span>O</span><span>S</span><span>P</span><span>E</span><span>C</span><span>T</span><span>A</span>
        </span>

        <!-- Máscara oclusora (z medio) -->
        <span class="logo-backing" aria-hidden="true"></span>

        <!-- Logo geométrico plano (z alto), centro absoluto, no se mueve -->
        <span class="logo-mark" id="logoMark">
          <svg class="logo-svg" viewBox="0 0 120 120" role="img" aria-label="PROSPECTA">
            <!-- Marco cuadrado grueso con la esquina superior derecha abierta -->
            <path d="M22 22 H74 M22 22 V98 H98 M98 98 V56"
                  fill="none" stroke="currentColor" stroke-width="9"
                  stroke-linecap="square" stroke-linejoin="miter" />
            <!-- Cuadrado sólido flotante donde iría la esquina superior derecha -->
            <rect x="90" y="12" width="17" height="17" fill="currentColor" />
            <!-- Letra 'P' sólida y gruesa en el centro -->
            <text x="60" y="61" text-anchor="middle" dominant-baseline="central"
                  font-family="Montserrat, sans-serif" font-weight="800" font-size="52"
                  fill="currentColor">P</text>
          </svg>
        </span>

      </button>
    </div>

    <!-- Firma al pie -->
    <p class="signature">by m.aceves y consultores</p>

  </div>

  <script>
  (function () {
    'use strict';

    /* Estado compartido — respuestas del asesor (personalización) */
    var advisorState = { answers: {} };
    window.PROSPECTA = window.PROSPECTA || {};
    window.PROSPECTA.advisorState = advisorState;

    var QUESTIONS = [
      { key: 'nombre',   label: 'Su nombre, por favor',        lineColor: 'silver' },
      { key: 'negocio',  label: '¿A qué se dedica su negocio?', lineColor: 'cyan'   }
    ];
    var qIndex = 0;

    var stage    = document.getElementById('stage');
    var brand    = document.getElementById('brand');
    var rospecta = document.getElementById('rospecta');
    var logoMark = document.getElementById('logoMark');

    var question = document.getElementById('captureQuestion');
    var field    = document.getElementById('captureField');
    var input    = document.getElementById('captureInput');
    var mirror   = document.getElementById('captureMirror');
    var hint     = document.getElementById('captureHint');

    var css = getComputedStyle(document.documentElement);
    var CURTAIN = parseTime(css.getPropertyValue('--curtain-time'), 1150);

    // Intro
    var SLIDE = 760;  // duración del deslizamiento de ROSPECTA
    var STEP  = 45;   // retardo escalonado por letra
    var PAUSE = 500;  // "el logo se queda un instante solo"

    function parseTime(v, fallback) {
      v = (v || '').trim();
      if (!v) return fallback;
      if (v.indexOf('ms') !== -1) return parseFloat(v);
      if (v.indexOf('s') !== -1) return parseFloat(v) * 1000;
      return fallback;
    }

    /* ============================================================ */
    /* FASE 1 → 2 · ROSPECTA se esconde detrás del logo → cortina   */
    /* ============================================================ */
    var introRunning = false;
    function runIntro() {
      if (introRunning) return;
      introRunning = true;
      brand.disabled = true;

      // Cada letra se desliza a la izquierda hasta quedar detrás del logo.
      var logoRect = logoMark.getBoundingClientRect();
      var wordRect = rospecta.getBoundingClientRect();
      // Distancia para que el borde derecho de la palabra pase el borde
      // izquierdo del logo (queda totalmente oculta tras la máscara).
      var pull = logoRect.left - wordRect.right - 12;

      var letters = rospecta.children;
      for (var i = 0; i < letters.length; i++) {
        letters[i].style.setProperty('--pull', pull + 'px');
        letters[i].style.transitionDelay = (i * STEP) + 'ms';
      }
      stage.classList.add('is-absorbing');

      var absorbTotal = SLIDE + (letters.length * STEP);
      window.setTimeout(function () {
        stage.classList.add('is-open'); // abre cortina + desvanece el logo
        window.setTimeout(startCapture, CURTAIN + 120);
      }, absorbTotal + PAUSE);
    }
    brand.addEventListener('click', runIntro);

    /* ============================================================ */
    /* FASE 3 · Captura: firma dinámica + magia de la 'P'           */
    /* ============================================================ */
    var minLine = 220;

    function syncWidth() {
      mirror.textContent = input.value || '';
      var textW = mirror.getBoundingClientRect().width;
      var target = Math.max(minLine, Math.ceil(textW) + 26);
      var cap = Math.floor(window.innerWidth * 0.9);
      input.style.width = Math.min(target, cap) + 'px';
    }

    function placeCaret() {
      var len = input.value.length;
      try { input.setSelectionRange(len, len); } catch (e) {}
    }

    function startCapture() {
      var declaredMin = parseFloat(getComputedStyle(input).minWidth);
      if (declaredMin && !isNaN(declaredMin)) minLine = declaredMin;
      syncWidth();
      input.focus();
      placeCaret();
    }

    input.addEventListener('input', function () {
      syncWidth();
      hint.classList.toggle('is-dim', input.value.trim().length > 0);
    });

    var transitioning = false;
    input.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      if (transitioning) return;
      if (input.value.trim().length === 0) return;
      runPMagic();
    });

    function runPMagic() {
      transitioning = true;

      var current = QUESTIONS[qIndex];
      var value = input.value.trim();
      advisorState.answers[current.key] = value;
      advisorState[current.key] = value;
      console.info('[PROSPECTA] Capturado:', current.key, '→', value);

      var isLast = (qIndex >= QUESTIONS.length - 1);
      var next = isLast ? null : QUESTIONS[qIndex + 1];

      var rect = input.getBoundingClientRect();
      input.style.width = rect.width + 'px';

      var flying = document.createElement('span');
      flying.className = 'capture__flying';
      flying.textContent = value;
      field.appendChild(flying);

      input.style.color = 'transparent';
      input.setAttribute('readonly', 'readonly');
      hint.classList.add('is-dim');

      var pLogo = document.createElement('span');
      pLogo.className = 'capture-p';
      pLogo.textContent = 'P';
      field.appendChild(pLogo);

      void pLogo.offsetWidth;
      pLogo.classList.add('is-flying');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { flying.classList.add('is-absorbed'); });
      });

      window.setTimeout(function () {
        if (next) swapQuestion(next.label);
        else swapQuestion('Gracias, ' + firstName(advisorState.nombre) + '.');
      }, 250);

      window.setTimeout(function () {
        input.value = '';
        input.style.color = '';
        input.removeAttribute('readonly');
        syncWidth();
        if (next) field.setAttribute('data-line', next.lineColor === 'cyan' ? 'cyan' : 'silver');
      }, 900);

      window.setTimeout(function () {
        if (flying.parentNode) flying.parentNode.removeChild(flying);
        if (pLogo.parentNode) pLogo.parentNode.removeChild(pLogo);
        if (next) {
          qIndex++;
          hint.classList.remove('is-dim');
          transitioning = false;
          input.focus();
          placeCaret();
        } else {
          finishCapture();
        }
      }, 1200);
    }

    function swapQuestion(text) {
      question.classList.add('is-hiding');
      window.setTimeout(function () {
        question.textContent = text;
        question.classList.remove('is-hiding');
      }, 260);
    }

    function firstName(full) { return full ? full.trim().split(/\s+/)[0] : ''; }

    function finishCapture() {
      hint.classList.add('is-dim');
      input.setAttribute('readonly', 'readonly');
      transitioning = false;
      console.info('[PROSPECTA] Captura completa:', advisorState.answers);
    }

    var resizeTimer;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () { if (!transitioning) syncWidth(); }, 120);
    });
  })();
  </script>

</body>
</html>
