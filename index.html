<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PROSPECTA | Interfaz del Asesor</title>
<meta name="description" content="PROSPECTA — Interfaz del Asesor." />
<meta name="theme-color" content="#000000" />

<!-- Tipografías: Montserrat (marca) + Inter (UI) + Playfair Display italic (entrada) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Montserrat:wght@600;700;800;900&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet" />

<style>
  /* ============================================================ */
  /* PALETA + VARIABLES                                            */
  /* ============================================================ */
  :root {
    --black:        #000000;
    --white:        #ffffff;
    --silver:       #b0bec5;
    --steel-cyan:   #74b9cc;
    --carbon:       #0f1115;

    /* La 'P' y 'ROSPECTA' comparten EXACTAMENTE este tamaño y peso */
    --logo-font:    clamp(40px, 6.6vw, 66px);
    --frame-w:      clamp(3px, 0.42vw, 5px);   /* grosor de línea del marco */
    --frame-py:     clamp(5px, 0.9vw, 10px);   /* aire arriba/abajo de la P */
    --frame-pl:     clamp(9px, 1.3vw, 15px);   /* aire a la izquierda */
    --frame-pr:     clamp(2px, 0.3vw, 4px);    /* aire mínimo a la derecha (lado abierto) */
    --kern:         2px;                        /* kerning marco → 'R' (mínimo) */

    --min-line:     clamp(180px, 45vw, 300px);
    --curtain-time: 900ms;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ============================================================ */
  /* LOGO ARMÓNICO — marco abierto (líneas blancas, sin lado der.) */
  /* Reutilizable: se clona como "barredor" en la Fase 3.          */
  /* ============================================================ */
  .logo-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    border: var(--frame-w) solid var(--white);
    border-right: none;          /* marco ABIERTO a la derecha */
    border-radius: 0;            /* esquinas en ángulo recto */
    background: transparent;
    padding: var(--frame-py) var(--frame-pr) var(--frame-py) var(--frame-pl);
    z-index: 3;
  }
  .logo-p {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: var(--logo-font);
    line-height: 1;
    color: var(--white);
    user-select: none;
  }

  /* ============================================================ */
  /* FASE 3 · FONDO + CAPTURA                                      */
  /* ============================================================ */
  .backdrop { position: fixed; inset: 0; z-index: 1; background: var(--carbon); }

  .advisor {
    position: fixed; inset: 0; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    padding: clamp(1.5rem, 6vw, 4rem);
    opacity: 0; pointer-events: none;
    transition: opacity 900ms ease;
  }
  .stage.is-open .advisor { opacity: 1; pointer-events: auto; transition-delay: var(--curtain-time); }

  .capture {
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    gap: clamp(2rem, 7vh, 3.75rem);
    width: 100%; max-width: 46rem; margin: 0 auto;
    transform: translateY(20px);
    transition: transform 1000ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .stage.is-open .capture { transform: translateY(0); transition-delay: var(--curtain-time); }

  .capture__question {
    font-family: 'Inter', sans-serif; font-weight: 300;
    font-size: clamp(1.3rem, 4.4vw, 2.35rem);
    line-height: 1.35; letter-spacing: 0.015em;
    color: #eef1f4; max-width: 20ch; text-wrap: balance;
    transition: opacity 320ms ease, transform 320ms ease;
  }
  .capture__question.is-hiding { opacity: 0; transform: translateY(-8px); }

  .capture__field { position: relative; display: flex; justify-content: center; align-items: flex-end; width: 100%; }
  .capture__mirror { position: absolute; visibility: hidden; white-space: pre; pointer-events: none; left: -9999px; top: 0; }

  .capture__input, .capture__mirror, .capture__flying {
    font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 500;
    font-size: clamp(2rem, 7.2vw, 3.7rem);
    line-height: 1.2; letter-spacing: 0.005em;
    padding: 0 0.2em 0.1em;
  }
  .capture__input {
    width: var(--min-line); min-width: var(--min-line); max-width: 90vw;
    text-align: center; color: var(--white);
    background: transparent; border: none;
    border-bottom: 2px solid var(--silver);
    caret-color: var(--white);
    transition: width 300ms cubic-bezier(0.22, 1, 0.36, 1), border-color 700ms ease, box-shadow 700ms ease;
  }
  .capture__input:focus { outline: none; }
  .capture__field[data-line="cyan"] .capture__input {
    border-bottom-color: var(--steel-cyan);
    caret-color: var(--steel-cyan);
    box-shadow: 0 3px 16px -8px rgba(116, 185, 204, 0.65);
  }

  .capture__hint {
    font-family: 'Inter', sans-serif; font-weight: 300;
    font-size: clamp(0.62rem, 1.6vw, 0.78rem);
    letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(176, 190, 197, 0.34);
    transition: opacity 320ms ease;
  }
  .capture__hint.is-dim { opacity: 0; }
  .capture__hint kbd { font-family: inherit; letter-spacing: normal; padding: 0 0.25em; color: rgba(176, 190, 197, 0.6); }

  .capture__flying {
    position: absolute; left: 50%; top: 50%; z-index: 2;
    white-space: nowrap; pointer-events: none; color: var(--white);
    transform: translate(-50%, -50%);
    transition: transform 500ms cubic-bezier(0.6, 0, 0.35, 1) 300ms, opacity 420ms ease 300ms;
  }
  .capture__flying.is-absorbed { transform: translate(-50%, -50%) translateX(-46vw) scale(0.14); opacity: 0; }

  /* BARREDOR: el MISMO logo (marco abierto + P) cruzando con estela */
  .sweeper {
    position: absolute; left: 50%; top: 50%;
    z-index: 5; pointer-events: none;
    transform: translate(-50%, -50%) translateX(54vw);
    transition: transform 850ms ease-in-out;
    will-change: transform, box-shadow;
  }
  .sweeper.is-sweeping {
    transform: translate(-50%, -50%) translateX(-70vw);
    animation: sweepTrail 850ms ease-in-out forwards;
  }
  @keyframes sweepTrail {
    0%   { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
    18%  { box-shadow: 85px 0 60px 5px rgba(255, 255, 255, 0.30), 175px 0 115px 2px rgba(184, 192, 200, 0.18); }
    60%  { box-shadow: 72px 0 55px 5px rgba(255, 255, 255, 0.24), 145px 0 100px 2px rgba(184, 192, 200, 0.14); }
    100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
  }

  /* ============================================================ */
  /* FASE 2 · CORTINA                                             */
  /* ============================================================ */
  .curtain { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
  .curtain__half {
    position: absolute; top: 0; width: 50.5vw; height: 100%;
    background: var(--black); border: 0; will-change: transform;
    transition: transform var(--curtain-time) cubic-bezier(0.76, 0, 0.24, 1);
  }
  .curtain__half--left  { left: 0;  transform: translateX(0); }
  .curtain__half--right { right: 0; transform: translateX(0); }
  .stage.is-open .curtain__half--left  { transform: translateX(-100%); }
  .stage.is-open .curtain__half--right { transform: translateX(100%); }

  /* ============================================================ */
  /* FASE 1 · CAPA DEL LOGO — bloque completo en centro absoluto   */
  /* ============================================================ */
  .logo-layer { position: fixed; inset: 0; z-index: 20; transition: opacity 450ms ease; }
  .stage.is-open .logo-layer { opacity: 0; pointer-events: none; }

  .brand {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; align-items: baseline;   /* misma línea base P ↔ ROSPECTA */
    cursor: pointer; background: none; border: 0; padding: 0;
  }
  .brand:focus-visible .logo-mark { outline: 2px solid var(--steel-cyan); outline-offset: 8px; }

  /* El marco sale disparado a la izquierda tras tragarse los textos */
  .brand .logo-mark { transition: transform 0.4s cubic-bezier(0.55, 0, 0.2, 1); }
  .stage.is-leaving .logo-mark { transform: translateX(-115vw); }

  /* Textos (ROSPECTA + firma) · z bajo: se ocultan tras el marco */
  .brand-text {
    display: flex; flex-direction: column; align-items: flex-start;
    margin-left: var(--kern);
    z-index: 1;
    text-align: left;
    transition: transform 0.4s cubic-bezier(0.7, 0, 0.2, 1);
  }
  .stage.is-absorbing .brand-text { transform: translateX(var(--pull, -340px)); }

  .brand-word {
    font-family: 'Montserrat', 'Inter', sans-serif;
    font-weight: 800;                 /* mismo peso que la 'P' */
    font-size: var(--logo-font);      /* mismo tamaño que la 'P' */
    line-height: 1;
    letter-spacing: 0.01em;
    color: var(--white);
    white-space: nowrap;
  }
  .brand-sign {
    margin-top: clamp(5px, 1vh, 10px);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.6rem, 1.5vw, 0.82rem);
    letter-spacing: 0.16em;
    color: rgba(176, 190, 197, 0.5);
    white-space: nowrap;
  }

  /* Máscara oclusora (negra, invisible sobre negro): oculta los textos */
  .logo-backing { position: absolute; top: -100vh; height: 300vh; background: var(--black); z-index: 2; }

  /* ============================================================ */
  /* RESPONSIVIDAD                                                */
  /* ============================================================ */
  @media (orientation: landscape) and (max-height: 500px) {
    :root { --logo-font: clamp(32px, 7vh, 54px); }
    .capture { gap: clamp(1.25rem, 5vh, 2rem); }
    .capture__question { font-size: clamp(1.15rem, 6vh, 1.9rem); }
    .capture__input, .capture__mirror, .capture__flying { font-size: clamp(1.9rem, 11vh, 3rem); }
  }

  /* ============================================================ */
  /* ACCESIBILIDAD                                                */
  /* ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .logo-mark, .brand-text, .curtain__half, .advisor, .capture, .logo-layer,
    .sweeper, .capture__flying, .capture__input { transition-duration: 0.001ms !important; }
    .sweeper.is-sweeping { animation: none; }
  }
</style>
</head>

<body>

  <!-- (sin clase) → Fase 1 · .is-absorbing → .is-leaving → .is-open → Fase 3 -->
  <div class="stage" id="stage">

    <!-- FASE 3 · Fondo carbón -->
    <div class="backdrop" aria-hidden="true"></div>

    <!-- FASE 3 · Captura -->
    <section class="advisor" id="advisor" aria-label="Captura de datos del diagnóstico">
      <div class="capture" id="capture">
        <h2 class="capture__question" id="captureQuestion">Su nombre, por favor</h2>
        <div class="capture__field" id="captureField" data-line="silver">
          <span class="capture__mirror" id="captureMirror" aria-hidden="true"></span>
          <input type="text" id="captureInput" class="capture__input"
            autocomplete="off" autocapitalize="words" spellcheck="false"
            enterkeyhint="next" maxlength="80" aria-label="Escriba su respuesta" />
        </div>
        <p class="capture__hint" id="captureHint">Presione <kbd>Enter</kbd> para continuar</p>
      </div>
    </section>

    <!-- FASE 2 · Cortina -->
    <div class="curtain" aria-hidden="true">
      <div class="curtain__half curtain__half--left"></div>
      <div class="curtain__half curtain__half--right"></div>
    </div>

    <!-- FASE 1 · Capa del logo -->
    <div class="logo-layer" id="logoLayer">
      <button type="button" class="brand" id="brand" aria-label="PROSPECTA — iniciar">

        <!-- Marco abierto + 'P' (z alto) -->
        <span class="logo-mark" id="logoMark"><span class="logo-p">P</span></span>

        <!-- Máscara oclusora (z medio) -->
        <span class="logo-backing" id="logoBacking" aria-hidden="true"></span>

        <!-- Textos: ROSPECTA + firma (z bajo) -->
        <span class="brand-text" id="brandText">
          <span class="brand-word">ROSPECTA</span>
          <span class="brand-sign">by M.aceves y consultores</span>
        </span>

      </button>
    </div>

  </div>

  <script>
  (function () {
    'use strict';

    var advisorState = { answers: {} };
    window.PROSPECTA = window.PROSPECTA || {};
    window.PROSPECTA.advisorState = advisorState;

    var QUESTIONS = [
      { key: 'nombre',   label: 'Su nombre, por favor',        lineColor: 'silver' },
      { key: 'negocio',  label: '¿A qué se dedica su negocio?', lineColor: 'cyan'   }
    ];
    var qIndex = 0;

    var stage     = document.getElementById('stage');
    var brand     = document.getElementById('brand');
    var brandText = document.getElementById('brandText');
    var logoMark  = document.getElementById('logoMark');
    var backing   = document.getElementById('logoBacking');

    var question = document.getElementById('captureQuestion');
    var field    = document.getElementById('captureField');
    var input    = document.getElementById('captureInput');
    var mirror   = document.getElementById('captureMirror');
    var hint     = document.getElementById('captureHint');

    var css = getComputedStyle(document.documentElement);
    var CURTAIN = parseTime(css.getPropertyValue('--curtain-time'), 900);
    var TEXT_SLIDE = 400, LOGO_OFF = 400;

    function parseTime(v, fallback) {
      v = (v || '').trim();
      if (!v) return fallback;
      if (v.indexOf('ms') !== -1) return parseFloat(v);
      if (v.indexOf('s') !== -1) return parseFloat(v) * 1000;
      return fallback;
    }

    /* La máscara negra cubre desde muy a la izquierda hasta el borde
       derecho del marco (invisible sobre negro; oculta los textos). */
    function updateMask() {
      var w = logoMark.offsetWidth;
      backing.style.left = '-100vw';
      backing.style.width = 'calc(100vw + ' + w + 'px)';
    }

    /* ============================================================ */
    /* FASE 1 → 2 · textos tras el marco → marco sale → cortina     */
    /* ============================================================ */
    var introRunning = false;
    function runIntro() {
      if (introRunning) return;
      introRunning = true;
      brand.disabled = true;

      updateMask();
      var pull = logoMark.getBoundingClientRect().right - brandText.getBoundingClientRect().right - 12;
      brandText.style.setProperty('--pull', pull + 'px');

      stage.classList.add('is-absorbing');
      window.setTimeout(function () { stage.classList.add('is-leaving'); }, TEXT_SLIDE + 30);
      window.setTimeout(function () {
        stage.classList.add('is-open');
        window.setTimeout(startCapture, CURTAIN + 120);
      }, TEXT_SLIDE + 30 + LOGO_OFF);
    }
    brand.addEventListener('click', runIntro);

    /* ============================================================ */
    /* FASE 3 · Captura: firma dinámica + barredor (mismo logo)     */
    /* ============================================================ */
    var minLine = 220;

    function syncWidth() {
      mirror.textContent = input.value || '';
      var textW = mirror.getBoundingClientRect().width;
      var target = Math.max(minLine, Math.ceil(textW) + 26);
      var cap = Math.floor(window.innerWidth * 0.9);
      input.style.width = Math.min(target, cap) + 'px';
    }
    function placeCaret() { var len = input.value.length; try { input.setSelectionRange(len, len); } catch (e) {} }
    function startCapture() {
      var declaredMin = parseFloat(getComputedStyle(input).minWidth);
      if (declaredMin && !isNaN(declaredMin)) minLine = declaredMin;
      syncWidth(); input.focus(); placeCaret();
    }

    input.addEventListener('input', function () {
      syncWidth();
      hint.classList.toggle('is-dim', input.value.trim().length > 0);
    });

    var transitioning = false;
    input.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      if (transitioning || input.value.trim().length === 0) return;
      runSweeper();
    });

    function runSweeper() {
      transitioning = true;

      var current = QUESTIONS[qIndex];
      var value = input.value.trim();
      advisorState.answers[current.key] = value;
      advisorState[current.key] = value;
      console.info('[PROSPECTA] Capturado:', current.key, '→', value);

      var isLast = (qIndex >= QUESTIONS.length - 1);
      var next = isLast ? null : QUESTIONS[qIndex + 1];

      var rect = input.getBoundingClientRect();
      input.style.width = rect.width + 'px';

      var flying = document.createElement('span');
      flying.className = 'capture__flying';
      flying.textContent = value;
      field.appendChild(flying);

      input.style.color = 'transparent';
      input.setAttribute('readonly', 'readonly');
      hint.classList.add('is-dim');

      // Barredor = clon EXACTO del mismo logo (marco abierto + P).
      var sweeper = logoMark.cloneNode(true);
      sweeper.removeAttribute('id');
      sweeper.classList.remove('logo-mark');
      sweeper.classList.add('logo-mark', 'sweeper'); // conserva estilos del marco + posiciona
      field.appendChild(sweeper);

      void sweeper.offsetWidth;
      sweeper.classList.add('is-sweeping');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { flying.classList.add('is-absorbed'); });
      });

      window.setTimeout(function () {
        if (next) swapQuestion(next.label);
        else swapQuestion('Gracias, ' + firstName(advisorState.nombre) + '.');
      }, 220);

      window.setTimeout(function () {
        input.value = '';
        input.style.color = '';
        input.removeAttribute('readonly');
        syncWidth(); // la línea se encoge de regreso a su mínimo (centrada)
        if (next) field.setAttribute('data-line', next.lineColor === 'cyan' ? 'cyan' : 'silver');
      }, 820);

      window.setTimeout(function () {
        if (flying.parentNode) flying.parentNode.removeChild(flying);
        if (sweeper.parentNode) sweeper.parentNode.removeChild(sweeper);
        if (next) {
          qIndex++;
          hint.classList.remove('is-dim');
          transitioning = false;
          input.focus(); placeCaret();
        } else { finishCapture(); }
      }, 1000);
    }

    function swapQuestion(text) {
      question.classList.add('is-hiding');
      window.setTimeout(function () {
        question.textContent = text;
        question.classList.remove('is-hiding');
      }, 240);
    }
    function firstName(full) { return full ? full.trim().split(/\s+/)[0] : ''; }
    function finishCapture() {
      hint.classList.add('is-dim');
      input.setAttribute('readonly', 'readonly');
      transitioning = false;
      console.info('[PROSPECTA] Captura completa:', advisorState.answers);
    }

    /* Recalcular máscara/ancho al cambiar el tamaño de ventana */
    var resizeTimer;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        if (!introRunning) updateMask();
        if (!transitioning) syncWidth();
      }, 120);
    });

    // Ajuste inicial de la máscara cuando las fuentes ya midieron el marco.
    window.addEventListener('load', updateMask);
    updateMask();
  })();
  </script>

</body>
</html>
